<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fichas Técnicas - misdocumentosapp.com</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; font-weight: 600; font-size: 0.875rem; text-decoration: none; transition: 0.3s; color: #94a3b8; }
        .nav-item:hover { background-color: #1e293b; color: white; }
        .nav-item.active { background-color: #2563eb; color: white !important; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); }
        /* Scrollbar personalizada para el editor */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="root" class="flex h-screen overflow-hidden"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            // --- ESTADOS Y LÓGICA DE TU CÓDIGO REACT ---
            const [isPdfReady, setIsPdfReady] = useState(true);
            const [isGenerating, setIsGenerating] = useState(false);
            const [primaryColor, setPrimaryColor] = useState("#0a58ca");
            const [footerColor, setFooterColor] = useState("#0f2c59");
            const [logo, setLogo] = useState(null);
            const [brand, setBrand] = useState("UYUSTOOLS");
            const [productName, setProductName] = useState('BROCHA PARA BARNIZ 2"');
            const [reference, setReference] = useState("SERIE PROFESIONAL | REF: BRO02U");
            const [description, setDescription] = useState("Herramienta de alto rendimiento diseñada para la aplicación precisa de barnices...");
            const [safetyNote, setSafetyNote] = useState("Mantener fuera del alcance de los niños...");
            const [productImage, setProductImage] = useState(null);
            const [keyProperties, setKeyProperties] = useState([
                { name: "Cerdas de doble acción", value: "Mezcla natural y sintética." },
                { name: "Virola reforzada", value: "Acero inoxidable." }
            ]);
            const [specs, setSpecs] = useState([
                { param: "Marca", value: "UYUSTOOLS PROFESSIONAL TOOLS" },
                { param: "Material Cerdas", value: "Naturales y Poliéster" }
            ]);

            const [footerCompany, setFooterCompany] = useState("DEL SOLAR TRUCK & CARS SPA — RUT: 76.779.159-3");
            const [footerHighlight, setFooterHighlight] = useState("GIRO: VENTA POR INTERNET");
            const [footerContact, setFooterContact] = useState("WhatsApp: +569 47436919 | Email: sadelsolar@gmail.com");
            const [footerLegal, setFooterLegal] = useState("DOCUMENTO PROPIEDAD DE TRUCKS & CARS");

            // --- LÓGICA DE PERSISTENCIA ---
            useEffect(() => {
                const saved = localStorage.getItem('fichaTecnicaDraft');
                if (saved) {
                    const data = JSON.parse(saved);
                    setBrand(data.brand || brand);
                    setProductName(data.productName || productName);
                    setPrimaryColor(data.primaryColor || primaryColor);
                    // ... cargar el resto de campos similarmente
                }
            }, []);

            useEffect(() => {
                const draft = { brand, productName, reference, description, safetyNote, keyProperties, specs, primaryColor, footerColor };
                localStorage.setItem('fichaTecnicaDraft', JSON.stringify(draft));
            }, [brand, productName, reference, description, safetyNote, keyProperties, specs, primaryColor, footerColor]);

            const handleImage = (e, setter) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => setter(ev.target.result);
                    reader.readAsDataURL(file);
                }
            };

            const generatePDF = () => {
                setIsGenerating(true);
                const element = document.getElementById('ficha-tecnica-pdf');
                const opt = {
                    margin: 0,
                    filename: `Ficha_${brand}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'mm', format: [215.9, 330.2], orientation: 'portrait' }
                };
                html2pdf().set(opt).from(element).save().then(() => setIsGenerating(false));
            };

            return (
                <div className="flex w-full h-full">
                    {/* 1. SIDEBAR GLOBAL DEL PROYECTO  */}
                    <aside className="w-64 bg-[#0f172a] p-6 flex flex-col shrink-0">
                        <div className="mb-10 text-white">
                            <h2 className="font-extrabold text-xl leading-none">MIS DOCUMENTOS</h2>
                            <p className="text-blue-500 text-[10px] font-bold tracking-widest uppercase mt-1">Ecosistema AI</p>
                        </div>
                        <nav className="space-y-2 flex-1">
                            <a href="index.html" className="nav-item"><i className="lucide-home w-4 h-4"></i> Dashboard</a>
                            <a href="perfil.html" className="nav-item"><i className="lucide-user w-4 h-4"></i> Ficha Comercial</a>
                            <a href="catalogo.html" className="nav-item"><i className="lucide-database w-4 h-4"></i> Catálogo Pro</a>
                            <a href="fichas.html" className="nav-item active"><i className="lucide-file-text w-4 h-4"></i> Fichas Técnicas</a>
                            <a href="cotizaciones.html" className="nav-item"><i className="lucide-shopping-cart w-4 h-4"></i> Cotizaciones</a>
                        </nav>
                        <div className="mt-auto p-4 bg-black/20 rounded-xl text-[9px] text-slate-500 font-black uppercase tracking-widest">
                            <p>Sistema Gestionado por</p>
                            <p className="text-blue-500">misdocumentosapp.com</p>
                        </div>
                    </aside>

                    {/* 2. EDITOR (TU CÓDIGO REACT)  */}
                    <div className="w-[400px] bg-white border-r border-gray-200 overflow-y-auto custom-scroll p-6">
                        <h2 className="font-bold text-gray-800 mb-6 flex items-center gap-2 border-b pb-2">
                             Editor Multiempresa
                        </h2>
                        
                        <div className="space-y-6">
                            <section>
                                <h3 className="text-[10px] font-black text-blue-600 uppercase mb-3">1. Brand Kit</h3>
                                <div className="space-y-3">
                                    <input type="file" onChange={e => handleImage(e, setLogo)} className="text-xs w-full" />
                                    <div className="flex gap-4">
                                        <input type="color" value={primaryColor} onChange={e => setPrimaryColor(e.target.value)} className="w-10 h-10" />
                                        <input type="color" value={footerColor} onChange={e => setFooterColor(e.target.value)} className="w-10 h-10" />
                                    </div>
                                </div>
                            </section>

                            <section>
                                <h3 className="text-[10px] font-black text-blue-600 uppercase mb-3">2. Datos Producto</h3>
                                <input type="text" value={brand} onChange={e => setBrand(e.target.value)} className="w-full border p-2 rounded mb-2" placeholder="Marca" />
                                <input type="text" value={productName} onChange={e => setProductName(e.target.value)} className="w-full border p-2 rounded mb-2" placeholder="Nombre" />
                                <input type="file" onChange={e => handleImage(e, setProductImage)} className="text-xs w-full" />
                            </section>

                            <section>
                                <h3 className="text-[10px] font-black text-blue-600 uppercase mb-3">3. Descripción</h3>
                                <textarea value={description} onChange={e => setDescription(e.target.value)} className="w-full border p-2 rounded text-xs h-24" />
                            </section>

                            <button 
                                onClick={generatePDF} 
                                style={{backgroundColor: primaryColor}}
                                className="w-full py-3 text-white font-bold rounded-xl shadow-lg uppercase text-xs"
                            >
                                {isGenerating ? 'Generando...' : 'Descargar PDF'}
                            </button>
                        </div>
                    </div>

                    {/* 3. PREVIEW  */}
                    <div className="flex-1 bg-gray-200 overflow-y-auto p-10 flex justify-center">
                        <div id="ficha-tecnica-pdf" className="w-[816px] min-h-[1248px] bg-[#f2f2f5] p-10 shadow-2xl flex flex-col">
                            <div className="bg-white border-2 border-gray-800 rounded-2xl p-6 flex justify-between items-center mb-8">
                                <div>
                                    <h1 className="text-4xl font-black" style={{color: primaryColor}}>{brand}</h1>
                                    <h2 className="text-2xl font-bold">{productName}</h2>
                                    <p className="text-gray-400 text-xs mt-1 uppercase font-bold">{reference}</p>
                                </div>
                                <div className="w-48 h-24 flex items-center justify-end">
                                    {logo && <img src={logo} className="max-h-full object-contain" />}
                                </div>
                            </div>

                            <div className="flex gap-8 flex-1">
                                <div className="w-1/2">
                                    <div className="bg-white aspect-square rounded-xl shadow-sm mb-6 flex items-center justify-center overflow-hidden border">
                                        {productImage ? <img src={productImage} className="w-full h-full object-contain" /> : "FOTO PRODUCTO"}
                                    </div>
                                    <div className="border-2 border-yellow-400 rounded-lg overflow-hidden">
                                        <div className="bg-yellow-400 p-2 text-[10px] font-black">NOTA DE SEGURIDAD</div>
                                        <div className="bg-white p-4 text-[10px]">{safetyNote}</div>
                                    </div>
                                </div>
                                <div className="w-1/2">
                                    <div className="bg-gray-800 text-white px-4 py-1 inline-block text-xs font-bold mb-4">DESCRIPCIÓN TÉCNICA</div>
                                    <p className="text-xs leading-relaxed mb-8">{description}</p>
                                    
                                    <div className="bg-gray-800 text-white px-4 py-1 inline-block text-xs font-bold mb-4">ESPECIFICACIONES</div>
                                    <table className="w-full text-xs">
                                        <tbody>
                                            {specs.map((s, i) => (
                                                <tr key={i} className="border-b border-gray-300">
                                                    <td className="py-2 font-bold uppercase text-[10px]" style={{color: primaryColor}}>{s.param}</td>
                                                    <td className="py-2 text-right font-medium">{s.value}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div className="mt-auto w-full pt-10">
                                <div className="p-6 text-center text-white" style={{backgroundColor: footerColor, borderTop: `4px solid ${primaryColor}`}}>
                                    <p className="font-bold text-sm">{footerCompany}</p>
                                    <p className="text-[10px] mt-2 opacity-80">{footerContact}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Inicializar iconos después de renderizar
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
