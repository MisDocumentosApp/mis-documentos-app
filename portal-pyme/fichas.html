<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Fichas Técnicas - misdocumentosapp.com</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; font-weight: 600; font-size: 0.875rem; text-decoration: none; color: #94a3b8; transition: 0.3s; }
        .nav-item.active { background-color: #2563eb; color: white !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // ESTADOS INICIALES LIMPIOS
            const [brandKit, setBrandKit] = useState({ logo: null, primary: "#059669", footer: "#064e3b" });
            const [product, setProduct] = useState({ brand: "", name: "", ref: "", image: null });
            const [details, setDetails] = useState({ technical: "", safety: "" });
            const [properties, setProperties] = useState([{ name: "", value: "" }]);
            const [specs, setSpecs] = useState([{ param: "", value: "" }]);
            
            // ESTADO DEL PIE DE PÁGINA
            const [footerContent, setFooterContent] = useState({
                company: "RAZÓN SOCIAL EMPRESA",
                contact: "WhatsApp / Email / Ubicación",
                legal: "DOCUMENTO DE ESPECIFICACIÓN TÉCNICA OFICIAL"
            });
            
            const [isGenerating, setIsGenerating] = useState(false);

            const handleReset = () => {
                if(window.confirm("¿Deseas vaciar toda la información de la ficha?")) {
                    setProduct({ brand: "", name: "", ref: "", image: null });
                    setDetails({ technical: "", safety: "" });
                    setProperties([{ name: "", value: "" }]);
                    setSpecs([{ param: "", value: "" }]);
                    setFooterContent({ company: "", contact: "", legal: "" });
                }
            };

            const handleImg = (e, type) => {
                const file = e.target.files[0];
                if (file) {
                    const r = new FileReader();
                    r.onload = (ev) => type === 'logo' ? setBrandKit({...brandKit, logo: ev.target.result}) : setProduct({...product, image: ev.target.result});
                    r.readAsDataURL(file);
                }
            };

            const generatePDF = () => {
                setIsGenerating(true);
                const element = document.getElementById('pdf-render');
                html2pdf().set({
                    margin: 0, filename: 'Ficha_Tecnica_Pro.pdf', image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 3, useCORS: true },
                    jsPDF: { unit: 'mm', format: [216, 330], orientation: 'portrait' }
                }).from(element).save().then(() => setIsGenerating(false));
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className="w-64 bg-[#0f172a] p-6 flex flex-col shrink-0">
                        <div className="mb-10 text-white">
                            <h2 className="font-extrabold text-xl uppercase leading-none">MIS DOCUMENTOS</h2>
                            <p className="text-blue-500 text-[10px] font-bold tracking-widest uppercase mt-1">Ecosistema AI</p>
                        </div>
                        <nav className="space-y-2 flex-1">
                            <a href="perfil.html" className="nav-item"><i className="lucide-user w-4 h-4"></i> Ficha Comercial</a>
                            <a href="fichas.html" className="nav-item active"><i className="lucide-file-text w-4 h-4"></i> Fichas Técnicas</a>
                            <a href="cotizaciones.html" className="nav-item"><i className="lucide-shopping-cart w-4 h-4"></i> Cotizaciones</a>
                        </nav>
                        <div className="mt-auto p-4 bg-black/20 rounded-xl text-[9px] text-slate-500 font-black uppercase tracking-widest leading-relaxed">
                            <p>Sistema Gestionado por</p>
                            <p className="text-blue-500 font-black italic">misdocumentosapp.com</p>
                        </div>
                    </aside>

                    {/* EDITOR PANEL */}
                    <div className="w-[420px] bg-white border-r custom-scroll overflow-y-auto p-6">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="font-bold text-gray-800 flex items-center gap-2 uppercase tracking-tighter text-sm">Editor Multiempresa</h2>
                            <button onClick={handleReset} className="px-3 py-1 bg-red-50 text-red-600 rounded text-[10px] font-black uppercase hover:bg-red-100 transition">Limpiar</button>
                        </div>

                        <div className="space-y-6">
                            <section className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase mb-3 border-b pb-1">1. Brand Kit</h3>
                                <div className="space-y-3">
                                    <input type="file" onChange={(e) => handleImg(e, 'logo')} className="text-[10px] w-full" />
                                    <div className="flex gap-4">
                                        <div className="flex-1">
                                            <label className="text-[10px] font-bold block mb-1">Color Principal</label>
                                            <input type="color" value={brandKit.primary} onChange={e => setBrandKit({...brandKit, primary: e.target.value})} className="w-full h-8 cursor-pointer border-0 p-0" />
                                        </div>
                                        <div className="flex-1">
                                            <label className="text-[10px] font-bold block mb-1">Color Footer</label>
                                            <input type="color" value={brandKit.footer} onChange={e => setBrandKit({...brandKit, footer: e.target.value})} className="w-full h-8 cursor-pointer border-0 p-0" />
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <section className="space-y-3">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase border-b pb-1">2. Datos Producto</h3>
                                <input type="text" placeholder="Marca" value={product.brand} onChange={e => setProduct({...product, brand: e.target.value})} className="w-full border p-2 rounded text-xs" />
                                <input type="text" placeholder="Nombre Producto" value={product.name} onChange={e => setProduct({...product, name: e.target.value})} className="w-full border p-2 rounded text-xs" />
                                <input type="text" placeholder="Referencia / SKU" value={product.ref} onChange={e => setProduct({...product, ref: e.target.value})} className="w-full border p-2 rounded text-xs" />
                                <input type="file" onChange={(e) => handleImg(e, 'prod')} className="text-[10px] w-full border rounded p-1" />
                            </section>

                            <section className="space-y-3">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase border-b pb-1">3. Detalles</h3>
                                <textarea placeholder="Descripción Técnica..." value={details.technical} onChange={e => setDetails({...details, technical: e.target.value})} className="w-full border p-2 rounded text-xs h-20 resize-none" />
                                <textarea placeholder="Nota de Seguridad..." value={details.safety} onChange={e => setDetails({...details, safety: e.target.value})} className="w-full border p-2 rounded text-xs h-16 resize-none" />
                            </section>

                            <section className="space-y-3">
                                <div className="flex justify-between items-center border-b pb-1">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase">4. Propiedades</h3>
                                    <button onClick={() => setProperties([...properties, {name:"", value:""}])} className="text-[10px] font-bold text-blue-600">+ AGREGAR</button>
                                </div>
                                {properties.map((p, i) => (
                                    <div key={i} className="flex gap-1">
                                        <input type="text" placeholder="Propiedad" value={p.name} onChange={e => {const n=[...properties]; n[i].name=e.target.value; setProperties(n)}} className="w-1/2 border p-1 rounded text-[10px]" />
                                        <input type="text" placeholder="Valor" value={p.value} onChange={e => {const n=[...properties]; n[i].value=e.target.value; setProperties(n)}} className="w-1/2 border p-1 rounded text-[10px]" />
                                    </div>
                                ))}
                            </section>

                            <section className="space-y-3">
                                <div className="flex justify-between items-center border-b pb-1">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase">5. Especificaciones</h3>
                                    <button onClick={() => setSpecs([...specs, {param:"", value:""}])} className="text-[10px] font-bold text-blue-600">+ AGREGAR</button>
                                </div>
                                {specs.map((s, i) => (
                                    <div key={i} className="flex gap-1">
                                        <input type="text" placeholder="Parámetro" value={s.param} onChange={e => {const n=[...specs]; n[i].param=e.target.value; setSpecs(n)}} className="w-1/2 border p-1 rounded text-[10px]" />
                                        <input type="text" placeholder="Valor" value={s.value} onChange={e => {const n=[...specs]; n[i].value=e.target.value; setSpecs(n)}} className="w-1/2 border p-1 rounded text-[10px]" />
                                    </div>
                                ))}
                            </section>

                            {/* SECCIÓN 6: PIE DE PÁGINA EDITABLE */}
                            <section className="space-y-3 pb-10">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase border-b pb-1">6. Pie de Página</h3>
                                <input type="text" placeholder="Nombre Empresa y RUT" value={footerContent.company} onChange={e => setFooterContent({...footerContent, company: e.target.value})} className="w-full border p-2 rounded text-xs" />
                                <input type="text" placeholder="Contacto (WhatsApp / Email)" value={footerContent.contact} onChange={e => setFooterContent({...footerContent, contact: e.target.value})} className="w-full border p-2 rounded text-xs" />
                                <input type="text" placeholder="Texto Legal" value={footerContent.legal} onChange={e => setFooterContent({...footerContent, legal: e.target.value})} className="w-full border p-2 rounded text-xs" />
                            </section>
                        </div>

                        <div className="sticky bottom-0 bg-white pt-4 border-t">
                            <button onClick={generatePDF} disabled={isGenerating} style={{backgroundColor: brandKit.primary}} className="w-full py-3 rounded-xl font-bold text-white shadow-lg uppercase text-xs tracking-widest flex items-center justify-center gap-2 hover:brightness-90 transition-all">
                                <i className="lucide-download w-4 h-4"></i> {isGenerating ? 'Generando...' : 'Descargar PDF Profesional'}
                            </button>
                        </div>
                    </div>

                    {/* PREVIEW PANEL */}
                    <div className="flex-1 bg-gray-200 overflow-y-auto p-10 flex justify-center">
                        <div id="pdf-render" className="w-[816px] min-h-[1248px] bg-[#f8fafc] p-10 flex flex-col shadow-2xl relative">
                            
                            <div className="bg-white border-2 border-gray-900 rounded-[20px] p-8 flex justify-between items-center mb-10 shadow-sm">
                                <div className="flex-1 pr-6 border-r border-gray-100">
                                    <h1 className="font-extrabold text-[38px] leading-none mb-2 uppercase tracking-tighter" style={{color: brandKit.primary}}>{product.brand || "NOMBRE MARCA"}</h1>
                                    <h2 className="text-gray-900 font-bold text-[22px] tracking-tight">{product.name || "Nombre del Producto"}</h2>
                                    <p className="text-slate-400 font-bold text-[11px] mt-2 uppercase tracking-[0.2em] italic">{product.ref || "Serie / Referencia de Producto"}</p>
                                </div>
                                <div className="w-52 h-24 flex items-center justify-end pl-6">
                                    {brandKit.logo ? <img src={brandKit.logo} className="max-h-full object-contain" /> : <div className="text-[10px] text-gray-300 font-black italic">LOGO EMPRESA</div>}
                                </div>
                            </div>

                            <div className="flex gap-10 flex-1">
                                <div className="w-[45%] flex flex-col">
                                    <div className="bg-white aspect-square rounded-[24px] shadow-sm border border-slate-100 p-6 flex items-center justify-center overflow-hidden mb-8">
                                        {product.image ? <img src={product.image} className="w-full h-full object-contain scale-110" /> : <i className="lucide-image w-16 h-16 text-slate-100"></i>}
                                    </div>
                                    
                                    <div className="border-2 border-yellow-400 rounded-2xl overflow-hidden shadow-sm mb-8">
                                        <div className="bg-yellow-400 p-2 text-[10px] font-black uppercase text-center tracking-widest">Nota de Seguridad</div>
                                        <div className="bg-white p-4 text-[10px] text-gray-700 leading-relaxed italic text-justify">{details.safety}</div>
                                    </div>

                                    <div className="bg-slate-900 text-white text-[10px] font-black px-4 py-2 self-start tracking-widest uppercase rounded-tr-xl mb-4">Especificaciones</div>
                                    <table className="w-full border-collapse border border-slate-100 rounded-xl overflow-hidden">
                                        <tbody>
                                            {specs.map((s, i) => s.param && (
                                                <tr key={i} className={`${i % 2 === 0 ? 'bg-white' : 'bg-slate-50/50'} border-b border-slate-100 last:border-0`}>
                                                    <td className="py-2 px-4 text-[10px] font-black uppercase" style={{color: brandKit.primary}}>{s.param}</td>
                                                    <td className="py-2 px-4 text-[11px] text-right font-semibold text-slate-600">{s.value}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                <div className="w-[55%] flex flex-col pt-2">
                                    <div className="bg-slate-900 text-white text-[10px] font-black px-4 py-2 self-start tracking-widest uppercase rounded-tr-xl mb-6">Descripción Técnica</div>
                                    <p className="text-[13px] text-gray-700 leading-relaxed mb-10 text-justify font-medium">{details.technical}</p>

                                    <div className="bg-slate-900 text-white text-[10px] font-black px-4 py-2 self-start tracking-widest uppercase rounded-tr-xl mb-6">Propiedades Clave</div>
                                    <ul className="space-y-4 mb-10">
                                        {properties.map((p, i) => p.name && (
                                            <li key={i} className="flex items-start text-[13px]">
                                                <span className="mr-3 text-[16px] leading-none mt-0.5" style={{color: brandKit.primary}}>■</span>
                                                <span className="text-slate-800"><strong className="font-extrabold uppercase text-xs">{p.name}:</strong> {p.value}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            </div>

                            {/* FOOTER DINÁMICO */}
                            <div className="mt-auto w-full pt-10">
                                <div className="p-8 text-center text-white rounded-t-[40px] shadow-2xl" style={{backgroundColor: brandKit.footer, borderTop: `6px solid ${brandKit.primary}`}}>
                                    <p className="font-black text-sm tracking-widest uppercase mb-1">{footerContent.company}</p>
                                    <p className="text-[10px] font-bold opacity-80 mb-4">{footerContent.contact}</p>
                                    <div className="h-[1px] w-20 bg-white/20 mx-auto mb-4"></div>
                                    <p className="text-[8px] opacity-40 uppercase tracking-[0.4em] font-black italic">{footerContent.legal}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
