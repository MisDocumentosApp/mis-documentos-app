<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Fichas Técnicas - misdocumentosapp.com</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; font-weight: 600; font-size: 0.875rem; text-decoration: none; color: #94a3b8; transition: 0.3s; }
        .nav-item.active { background-color: #2563eb; color: white !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // --- ESTADOS INICIALES LIMPIOS (SIN DATOS HARDCODEADOS) ---
            const [brandKit, setBrandKit] = useState({ logo: null, primary: "#0a58ca", footer: "#0f2c59" });
            const [product, setProduct] = useState({ brand: "", name: "", ref: "", image: null });
            const [details, setDetails] = useState({ technical: "", safety: "" });
            const [properties, setProperties] = useState([{ name: "", value: "" }]);
            const [specs, setSpecs] = useState([{ param: "", value: "" }]);
            const [footer, setFooter] = useState({ company: "", highlight: "", contact: "", legal: "" });
            
            const [isGenerating, setIsGenerating] = useState(false);

            // Función para Limpiar Todo
            const handleReset = () => {
                if(window.confirm("¿Vaciar todo el formulario?")) {
                    setBrandKit({ logo: null, primary: "#0a58ca", footer: "#0f2c59" });
                    setProduct({ brand: "", name: "", ref: "", image: null });
                    setDetails({ technical: "", safety: "" });
                    setProperties([{ name: "", value: "" }]);
                    setSpecs([{ param: "", value: "" }]);
                    setFooter({ company: "", highlight: "", contact: "", legal: "" });
                }
            };

            const handleImg = (e, type) => {
                const file = e.target.files[0];
                if (file) {
                    const r = new FileReader();
                    r.onload = (ev) => type === 'logo' ? setBrandKit({...brandKit, logo: ev.target.result}) : setProduct({...product, image: ev.target.result});
                    r.readAsDataURL(file);
                }
            };

            const generatePDF = () => {
                setIsGenerating(true);
                const element = document.getElementById('pdf-render');
                html2pdf().set({
                    margin: 0, filename: 'Ficha_Tecnica.pdf', image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 3, useCORS: true },
                    jsPDF: { unit: 'mm', format: [216, 330], orientation: 'portrait' }
                }).from(element).save().then(() => setIsGenerating(false));
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* 1. SIDEBAR PROFESIONAL */}
                    <aside className="w-64 bg-[#0f172a] p-6 flex flex-col shrink-0">
                        <div className="mb-10 text-white">
                            <h2 className="font-extrabold text-xl">MIS DOCUMENTOS</h2>
                            <p className="text-blue-500 text-[10px] font-bold uppercase mt-1">Ecosistema AI</p>
                        </div>
                        <nav className="space-y-2 flex-1">
                            <a href="perfil.html" className="nav-item"><i className="lucide-user w-4 h-4"></i> Ficha Comercial</a>
                            <a href="fichas.html" className="nav-item active"><i className="lucide-file-text w-4 h-4"></i> Fichas Técnicas</a>
                            <a href="cotizaciones.html" className="nav-item"><i className="lucide-shopping-cart w-4 h-4"></i> Cotizaciones</a>
                        </nav>
                        <div className="mt-auto p-4 bg-black/20 rounded-xl text-[9px] text-slate-500 font-black uppercase tracking-widest leading-relaxed">
                            <p>Sistema Gestionado por</p>
                            <p className="text-blue-500 font-black">misdocumentosapp.com</p>
                            <p className="mt-3 opacity-50 italic">Soporte Técnico:</p>
                            <p>microempresasaunclick@gmail.com</p>
                        </div>
                    </aside>

                    {/* 2. EDITOR PANEL */}
                    <div className="w-[420px] bg-white border-r custom-scroll overflow-y-auto p-6">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="font-bold text-gray-800 flex items-center gap-2 tracking-tighter uppercase"><i className="lucide-edit-3 w-4 h-4 text-blue-600"></i> Editor Multiempresa</h2>
                            <button onClick={handleReset} className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition" title="Limpiar Formulario">
                                <i className="lucide-trash-2 w-5 h-5"></i>
                            </button>
                        </div>

                        {/* SECCIONES EDITABLES */}
                        <div className="space-y-6">
                            <section className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                                <h3 className="text-[10px] font-black text-blue-700 uppercase mb-3">1. Brand Kit (Identidad)</h3>
                                <div className="space-y-3">
                                    <label className="text-[10px] font-bold block text-gray-600">Logo Empresa</label>
                                    <input type="file" onChange={(e) => handleImg(e, 'logo')} className="text-[10px] w-full" />
                                    <div className="flex gap-4">
                                        <div className="flex-1">
                                            <label className="text-[10px] font-bold block mb-1">Color Primario</label>
                                            <input type="color" value={brandKit.primary} onChange={e => setBrandKit({...brandKit, primary: e.target.value})} className="w-full h-8 cursor-pointer border-0 p-0" />
                                        </div>
                                        <div className="flex-1">
                                            <label className="text-[10px] font-bold block mb-1">Color Footer</label>
                                            <input type="color" value={brandKit.footer} onChange={e => setBrandKit({...brandKit, footer: e.target.value})} className="w-full h-8 cursor-pointer border-0 p-0" />
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <section className="space-y-3">
                                <h3 className="text-[10px] font-black text-gray-400 uppercase border-b pb-1">2. Datos del Producto</h3>
                                <input type="text" placeholder="Marca (Ej: UYUSTOOLS)" value={product.brand} onChange={e => setProduct({...product, brand: e.target.value})} className="w-full border p-2 rounded text-xs focus:ring-1 focus:ring-blue-500" />
                                <input type="text" placeholder="Nombre Producto" value={product.name} onChange={e => setProduct({...product, name: e.target.value})} className="w-full border p-2 rounded text-xs focus:ring-1 focus:ring-blue-500" />
                                <input type="text" placeholder="Serie / SKU / Referencia" value={product.ref} onChange={e => setProduct({...product, ref: e.target.value})} className="w-full border p-2 rounded text-xs focus:ring-1 focus:ring-blue-500" />
                                <div className="pt-2">
                                    <label className="text-[10px] font-bold block text-gray-600 mb-1 uppercase">Imagen de Producto</label>
                                    <input type="file" onChange={(e) => handleImg(e, 'prod')} className="text-[10px] w-full border rounded p-1" />
                                </div>
                            </section>

                            <section className="space-y-3">
                                <h3 className="text-[10px] font-black text-gray-400 uppercase border-b pb-1">3. Detalles y Seguridad</h3>
                                <textarea placeholder="Descripción Técnica..." value={details.technical} onChange={e => setDetails({...details, technical: e.target.value})} className="w-full border p-2 rounded text-xs h-20 resize-none" />
                                <textarea placeholder="Nota de Seguridad..." value={details.safety} onChange={e => setDetails({...details, safety: e.target.value})} className="w-full border p-2 rounded text-xs h-16 resize-none" />
                            </section>

                            <section className="space-y-3">
                                <div className="flex justify-between items-center border-b pb-1">
                                    <h3 className="text-[10px] font-black text-gray-400 uppercase">4. Propiedades Clave</h3>
                                    <button onClick={() => setProperties([...properties, {name:"", value:""}])} className="text-[10px] font-black text-blue-600">+ AGREGAR</button>
                                </div>
                                {properties.map((p, i) => (
                                    <div key={i} className="flex gap-1">
                                        <input type="text" placeholder="Propiedad" value={p.name} onChange={e => {const n=[...properties]; n[i].name=e.target.value; setProperties(n)}} className="w-1/2 border p-1 rounded text-[10px]" />
                                        <input type="text" placeholder="Valor" value={p.value} onChange={e => {const n=[...properties]; n[i].value=e.target.value; setProperties(n)}} className="w-1/2 border p-1 rounded text-[10px]" />
                                    </div>
                                ))}
                            </section>

                            <section className="space-y-3">
                                <div className="flex justify-between items-center border-b pb-1">
                                    <h3 className="text-[10px] font-black text-gray-400 uppercase">5. Cuadro Especificaciones</h3>
                                    <button onClick={() => setSpecs([...specs, {param:"", value:""}])} className="text-[10px] font-black text-blue-600">+ AGREGAR</button>
                                </div>
                                {specs.map((s, i) => (
                                    <div key={i} className="flex gap-1">
                                        <input type="text" placeholder="Parámetro" value={s.param} onChange={e => {const n=[...specs]; n[i].param=e.target.value; setSpecs(n)}} className="w-1/2 border p-1 rounded text-[10px]" />
                                        <input type="text" placeholder="Valor" value={s.value} onChange={e => {const n=[...specs]; n[i].value=e.target.value; setSpecs(n)}} className="w-1/2 border p-1 rounded text-[10px]" />
                                    </div>
                                ))}
                            </section>

                            <section className="space-y-3 pb-6">
                                <h3 className="text-[10px] font-black text-gray-400 uppercase border-b pb-1">6. Pie de Página</h3>
                                <input type="text" placeholder="Empresa y RUT" value={footer.company} onChange={e => setFooter({...footer, company: e.target.value})} className="w-full border p-1.5 rounded text-[10px]" />
                                <input type="text" placeholder="WhatsApp / Email" value={footer.contact} onChange={e => setFooter({...footer, contact: e.target.value})} className="w-full border p-1.5 rounded text-[10px]" />
                                <input type="text" placeholder="Texto Legal" value={footer.legal} onChange={e => setFooter({...footer, legal: e.target.value})} className="w-full border p-1.5 rounded text-[10px]" />
                            </section>
                        </div>

                        <div className="sticky bottom-0 bg-white pt-4 border-t">
                            <button onClick={generatePDF} disabled={isGenerating} style={{backgroundColor: brandKit.primary}} className="w-full py-3 rounded-xl font-bold text-white flex justify-center items-center gap-2 shadow-lg uppercase text-xs tracking-widest hover:opacity-90 active:scale-95 transition-all">
                                <i className="lucide-download w-4 h-4"></i> {isGenerating ? 'Generando...' : 'Descargar PDF'}
                            </button>
                        </div>
                    </div>

                    {/* 3. PREVIEW PANEL (OFICIO) */}
                    <div className="flex-1 bg-gray-200 overflow-y-auto p-10 flex justify-center">
                        <div id="pdf-render" className="w-[816px] min-h-[1248px] bg-[#f2f2f5] p-10 flex flex-col shadow-2xl relative">
                            
                            {/* Cabecera Preview */}
                            <div className="bg-white border-2 border-gray-800 rounded-2xl p-6 flex justify-between items-center mb-8">
                                <div className="flex-1 pr-6">
                                    <h1 className="font-extrabold text-[36px] leading-none mb-1 uppercase tracking-tighter" style={{color: brandKit.primary}}>{product.brand || "NOMBRE MARCA"}</h1>
                                    <h2 className="text-gray-800 font-bold text-[20px] tracking-tight leading-tight">{product.name || "Nombre del Producto"}</h2>
                                    <p className="text-gray-400 font-bold text-[11px] mt-2 uppercase tracking-widest">{product.ref || "Referencia de Producto"}</p>
                                </div>
                                <div className="w-48 h-24 flex items-center justify-end">
                                    {brandKit.logo ? <img src={brandKit.logo} className="max-h-full object-contain" /> : <div className="w-full h-full border border-dashed flex items-center justify-center text-[10px] text-gray-300">ESPACIO LOGO</div>}
                                </div>
                            </div>

                            <div className="flex gap-8 flex-1">
                                {/* Columna Izquierda: Imagen y Seguridad */}
                                <div className="w-[45%] flex flex-col">
                                    <div className="bg-white aspect-square rounded-2xl shadow-sm border p-4 flex items-center justify-center overflow-hidden mb-6">
                                        {product.image ? <img src={product.image} className="w-full h-full object-contain" /> : <i className="lucide-image w-12 h-12 text-gray-100"></i>}
                                    </div>
                                    
                                    {details.safety && (
                                        <div className="border-2 border-yellow-400 rounded-xl overflow-hidden shadow-sm">
                                            <div className="bg-yellow-400 p-2 text-[10px] font-black uppercase text-center"><i className="lucide-alert-triangle inline w-3 h-3 mr-1"></i> Nota de Seguridad</div>
                                            <div className="bg-white p-4 text-[10px] text-gray-700 leading-relaxed italic text-justify">{details.safety}</div>
                                        </div>
                                    )}
                                </div>

                                {/* Columna Derecha: Descripción y Props */}
                                <div className="w-[55%] flex flex-col">
                                    <div className="bg-gray-800 text-white text-[10px] font-black px-4 py-1.5 self-start tracking-widest shadow-md mb-4">DESCRIPCIÓN TÉCNICA</div>
                                    <p className="text-[12px] text-gray-700 leading-relaxed mb-8 text-justify">{details.technical || "Aquí aparecerá la descripción de tu producto..."}</p>

                                    <div className="bg-gray-800 text-white text-[10px] font-black px-4 py-1.5 self-start tracking-widest shadow-md mb-4">PROPIEDADES CLAVE</div>
                                    <ul className="space-y-2 mb-8">
                                        {properties.map((p, i) => p.name && (
                                            <li key={i} className="flex items-start text-[12px]">
                                                <span className="mr-2 text-[14px] leading-none" style={{color: brandKit.primary}}>■</span>
                                                <span><strong className="font-extrabold">{p.name}:</strong> {p.value}</span>
                                            </li>
                                        ))}
                                    </ul>

                                    <div className="bg-gray-800 text-white text-[10px] font-black px-4 py-1.5 self-start tracking-widest shadow-md mb-4 uppercase">Especificaciones</div>
                                    <table className="w-full border-collapse">
                                        <tbody>
                                            {specs.map((s, i) => s.param && (
                                                <tr key={i} className={`${i % 2 === 0 ? 'bg-white' : 'bg-gray-50'} border-b border-gray-100`}>
                                                    <td className="py-2 text-[10px] font-black uppercase pr-4" style={{color: brandKit.primary}}>{s.param}</td>
                                                    <td className="py-2 text-[11px] text-right font-medium text-gray-600">{s.value}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* Footer de la Ficha */}
                            <div className="mt-auto w-full pt-10">
                                <div className="p-6 text-center text-white rounded-t-3xl shadow-2xl" style={{backgroundColor: brandKit.footer, borderTop: `5px solid ${brandKit.primary}`}}>
                                    <p className="font-extrabold text-[12px] tracking-wide mb-1">{footer.company || "RAZÓN SOCIAL EMPRESA"}</p>
                                    <p className="text-[10px] font-medium opacity-90">{footer.contact || "WhatsApp / Email / Web"}</p>
                                    <p className="text-[8px] mt-4 opacity-50 uppercase tracking-widest font-bold">{footer.legal || "Documento de propiedad técnica registrada"}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Init Lucide
        setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
