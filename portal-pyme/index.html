<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Documentos | Fix Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .active-nav { background-color: #2563eb !important; color: white !important; }
        .sidebar-item { transition: all 0.2s ease; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; font-weight: 700; font-size: 14px; color: #94a3b8; }
        .sidebar-item:hover:not(.active-nav) { background-color: #1e293b; color: white; }
        .view-content { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-hidden h-screen flex">

    <aside class="w-64 bg-[#0f172a] text-white flex flex-col shrink-0">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-10">
                <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="box" size="20"></i></div>
                <div>
                    <h1 class="text-sm font-black uppercase leading-none">Mis Documentos</h1>
                    <span class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">Portal Pyme AI</span>
                </div>
            </div>
            <nav class="space-y-1">
                <div onclick="switchView('dashboard')" id="nav-dashboard" class="sidebar-item active-nav"><i data-lucide="layout-grid" size="18"></i> Dashboard</div>
                <div onclick="switchView('perfil')" id="nav-perfil" class="sidebar-item"><i data-lucide="building-2" size="18"></i> Perfil Empresa</div>
                <div onclick="switchView('docuflow')" id="nav-docuflow" class="sidebar-item"><i data-lucide="cpu" size="18"></i> DocuFlow AI</div>
                <div onclick="switchView('catalogo')" id="nav-catalogo" class="sidebar-item"><i data-lucide="database" size="18"></i> Catálogo Pro</div>
            </nav>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8">
            <h2 id="current-title" class="text-[10px] font-black uppercase tracking-widest text-slate-400">Dashboard</h2>
        </header>

        <div class="flex-1 overflow-auto p-10">
            <div id="view-dashboard" class="view-content">
                <div class="bg-blue-600 rounded-[2.5rem] p-16 text-white shadow-xl">
                    <h2 class="text-5xl font-black mb-4 tracking-tighter">Hola, MAPUE SPA</h2>
                    <p class="text-blue-100 font-medium">Sistema restaurado. El error de "Already Declared" ha sido eliminado.</p>
                </div>
            </div>

            <div id="view-catalogo" class="view-content hidden">
                <div class="grid grid-cols-3 gap-8">
                    <div class="col-span-1 bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm h-fit">
                        <h3 class="font-black uppercase text-xs mb-6 text-blue-600 italic">Nuevo Producto</h3>
                        <div class="space-y-4">
                            <input id="prod-nombre" type="text" placeholder="Nombre (ej: Fusible 1000A)" class="w-full p-3 bg-slate-50 border rounded-xl text-sm font-medium">
                            <input id="prod-sku" type="text" placeholder="SKU (ej: CL52)" class="w-full p-3 bg-slate-50 border rounded-xl text-sm font-medium uppercase">
                            <input id="prod-marca" type="text" placeholder="Marca (ej: Eaton)" class="w-full p-3 bg-slate-50 border rounded-xl text-sm font-medium">
                            <button onclick="guardarProducto()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Guardar en Base de Datos</button>
                        </div>
                    </div>
                    <div class="col-span-2 bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                        <h3 class="font-black uppercase text-xs mb-6">Inventario Real</h3>
                        <table class="w-full text-left">
                            <thead class="text-[9px] font-black uppercase text-slate-400 border-b">
                                <tr><th class="pb-4">Descripción</th><th class="pb-4">SKU</th><th class="pb-4">Marca</th></tr>
                            </thead>
                            <tbody id="tabla-productos" class="divide-y text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="view-perfil" class="view-content hidden p-20 text-center font-bold">Módulo Perfil Empresa</div>
            <div id="view-docuflow" class="view-content hidden p-20 text-center font-bold">Módulo DocuFlow AI</div>
        </div>
    </main>

    <script>
        // --- CONFIGURACIÓN ÚNICA ---
        const SB_URL = "https://xnarwetyjeijkitzivno.supabase.co"; 
        const SB_KEY = "sb_publishable_9N60sB1Y7iOf3lTsh8ZM3Q___nZto7W";

        // Usamos un nombre que no choque con nada
        const clienteSupabase = window.supabase.createClient(SB_URL, SB_KEY);

        // FUNCIÓN DE NAVEGACIÓN
        function switchView(viewId) {
            // Ocultar todas las vistas
            const allViews = document.querySelectorAll('.view-content');
            allViews.forEach(v => v.classList.add('hidden'));

            // Quitar estilo activo de botones
            const allBtns = document.querySelectorAll('.sidebar-item');
            allBtns.forEach(b => b.classList.remove('active-nav', 'text-white'));

            // Mostrar la seleccionada
            const target = document.getElementById('view-' + viewId);
            if (target) {
                target.classList.remove('hidden');
                document.getElementById('nav-' + viewId).classList.add('active-nav', 'text-white');
                document.getElementById('current-title').innerText = viewId.toUpperCase();
            }

            if(viewId === 'catalogo') cargarProductos();
            lucide.createIcons();
        }

        async function cargarProductos() {
            const { data, error } = await clienteSupabase.from('productos').select('*');
            if (error) {
                console.error("Error al cargar:", error.message);
                return;
            }
            const tabla = document.getElementById('tabla-productos');
            tabla.innerHTML = data.map(p => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="py-4 font-bold">${p.nombre}</td>
                    <td class="py-4 font-mono text-blue-600">${p.sku}</td>
                    <td class="py-4 text-slate-500">${p.marca}</td>
                </tr>
            `).join('');
        }

        async function guardarProducto() {
            const nombre = document.getElementById('prod-nombre').value;
            const sku = document.getElementById('prod-sku').value;
            const marca = document.getElementById('prod-marca').value;

            if(!nombre || !sku) return alert("Nombre y SKU son obligatorios");

            const { error } = await clienteSupabase.from('productos').insert([{ nombre, sku, marca }]);
            
            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("¡Guardado con éxito!");
                document.getElementById('prod-nombre').value = "";
                document.getElementById('prod-sku').value = "";
                document.getElementById('prod-marca').value = "";
                cargarProductos();
            }
        }

        window.onload = () => { lucide.createIcons(); };
    </script>
</body>
</html>
