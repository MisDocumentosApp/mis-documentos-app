<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo Pro - misdocumentosapp.com</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; height: 100vh; overflow: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* ALTA DENSIDAD PRO (ZOOM 100%) */
        .input-dense { width: 100%; padding: 6px 14px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 0.82rem; outline: none; transition: 0.1s; color: #0f172a; background: white; }
        .input-dense:focus { border-color: #2563eb; background-color: #fcfdfe; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.06); }
        .section-tag { font-weight: 800; font-size: 0.62rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 2px solid #f1f5f9; padding-bottom: 4px; margin-bottom: 14px; display: block; }
        
        /* SIDEBAR PROFESIONAL */
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 12px; font-weight: 600; font-size: 0.8rem; color: #94a3b8; cursor: pointer; transition: 0.2s; }
        .nav-item:hover { background-color: #1e293b; color: white; }
        .nav-item.active { background-color: #2563eb; color: white !important; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }

        /* Estilos PDF Directo */
        .pdf-capture-mode { padding: 50px !important; width: 816px !important; margin: 0 !important; border: none !important; box-shadow: none !important; position: absolute; left: 0; top: 0; background: white; z-index: 1000; }
        .no-print { display: none !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            // --- ESTADOS DE DATOS ---
            const [companies] = useState(['Empresa Principal', 'DEL SOLAR TRUCK & CARS SPA']);
            const [activeCompany, setActiveCompany] = useState(localStorage.getItem('catalog_active_company') || companies[0]);
            const [products, setProducts] = useState([]);
            const [currentView, setCurrentView] = useState('list'); // 'list' | 'form'
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');

            // Cargar datos
            useEffect(() => {
                const saved = localStorage.getItem(`catalog_products_${activeCompany}`);
                setProducts(saved ? JSON.parse(saved) : []);
                localStorage.setItem('catalog_active_company', activeCompany);
            }, [activeCompany]);

            // --- MOTOR DE GUARDADO Y PDF CORREGIDO (MÉTODO DIRECTO) ---
            const handleSaveAndPDF = (productData, formElement) => {
                setIsSaving(true);
                
                // 1. Sincronizar Datos
                const id = productData.id || Date.now();
                const finalData = { ...productData, id };
                const updated = productData.id ? products.map(p => p.id === id ? finalData : p) : [finalData, ...products];
                setProducts(updated);
                localStorage.setItem(`catalog_products_${activeCompany}`, JSON.stringify(updated));

                // 2. Preparar Formulario para Captura (Formato Oficio)
                formElement.classList.add('pdf-capture-mode');
                
                // Ocultar botones y elementos de UI en el PDF
                const nonPrintable = formElement.querySelectorAll('.no-print');
                nonPrintable.forEach(el => el.style.display = 'none');

                const opt = {
                    margin: 0,
                    filename: `Ficha_${finalData.item || 'Insumo'}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 3, useCORS: true, letterRendering: true, logging: false },
                    jsPDF: { unit: 'mm', format: [216, 330], orientation: 'portrait' }
                };

                // 3. Generar PDF desde el formulario visible
                html2pdf().set(opt).from(formElement).save().then(() => {
                    // Restaurar UI
                    formElement.classList.remove('pdf-capture-mode');
                    nonPrintable.forEach(el => el.style.display = '');
                    setIsSaving(false);
                    setCurrentView('list');
                    setSelectedProduct(null);
                    alert("✅ Guardado y PDF generado con éxito.");
                }).catch(err => {
                    console.error("Error PDF:", err);
                    alert("❌ Error al generar PDF.");
                    setIsSaving(false);
                });
            };

            // --- NAVEGACIÓN BLINDADA (EVITA PANTALLA BLANCA) ---
            const handleEnterDetail = (product) => {
                if (!product) return;
                // Clonado profundo para evitar referencias corruptas
                setSelectedProduct(JSON.parse(JSON.stringify(product)));
                setCurrentView('form');
            };

            const handleDelete = (id) => {
                if(window.confirm("¿Estás seguro de que deseas eliminar este producto permanentemente?")) {
                    const updated = products.filter(p => p.id !== id);
                    setProducts(updated);
                    localStorage.setItem(`catalog_products_${activeCompany}`, JSON.stringify(updated));
                }
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR MISDOCUMENTOSAPP.COM */}
                    <aside className="w-64 bg-[#0f172a] p-6 flex flex-col shrink-0 shadow-2xl">
                        <div className="mb-10 text-white px-2">
                            <h2 className="font-extrabold text-xl uppercase italic tracking-tighterleading-none">MIS DOCUMENTOS</h2>
                            <p className="text-blue-500 text-[10px] font-bold tracking-widest uppercase mt-1">Ecosistema AI</p>
                        </div>
                        <nav className="flex-1 space-y-1.5">
                            <div onClick={() => { setSelectedProduct(null); setCurrentView('list'); }} className={`nav-item ${currentView === 'list' ? 'active' : ''}`}><Icon name="database" /> Inventario Pro</div>
                            <div onClick={() => { setSelectedProduct(null); setCurrentView('form'); }} className={`nav-item ${currentView === 'form' ? 'active' : ''}`}><Icon name="plus-circle" /> Nuevo Registro</div>
                            <a href="perfil.html" className="nav-item"><Icon name="user" /> Ficha Comercial</a>
                        </nav>
                        <div className="mt-auto p-4 bg-black/20 rounded-xl text-[8px] text-slate-500 font-bold uppercase border border-white/5 tracking-wider">
                            <p>managed by <span className="text-blue-500 font-black">misdocumentosapp.com</span></p>
                        </div>
                    </aside>

                    {/* ÁREA DE TRABAJO */}
                    <main className="flex-1 flex flex-col bg-slate-50 overflow-hidden min-w-0">
                        <header className="h-16 bg-white border-b px-8 flex items-center justify-between shrink-0 shadow-sm z-10">
                            <h1 className="text-sm font-black text-slate-800 uppercase tracking-widest">Catálogo Pro v2.1</h1>
                            {isSaving && (
                                <div className="flex items-center gap-2 text-[10px] font-black text-blue-600 animate-pulse uppercase">
                                    <Icon name="refresh-cw" className="animate-spin" size={14}/> Sincronizando PDF...
                                </div>
                            )}
                        </header>

                        <div className="flex-1 overflow-y-auto p-6 lg:p-10 custom-scroll bg-slate-50">
                            {currentView === 'list' ? (
                                <div className="max-w-7xl mx-auto space-y-6">
                                    <div className="flex justify-between items-center">
                                        <button onClick={() => { setSelectedProduct(null); setCurrentView('form'); }} className="px-6 py-3 bg-blue-600 text-white text-[11px] font-black rounded-xl shadow-lg hover:bg-blue-700 uppercase transition">Nuevo Item</button>
                                        <input type="text" placeholder="Filtrar por Item o SKU..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-80 bg-white border rounded-full px-6 py-2.5 text-xs outline-none focus:ring-2 focus:ring-blue-500 shadow-sm" />
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {products.filter(p => (p.item || "").toLowerCase().includes(searchTerm.toLowerCase())).map(p => (
                                            <div key={p.id} className="bg-white p-6 rounded-[2rem] border shadow-sm hover:border-blue-500 transition-all cursor-pointer relative group" onClick={() => handleEnterDetail(p)}>
                                                {/* BOTÓN ELIMINAR */}
                                                <button onClick={(e) => { e.stopPropagation(); handleDelete(p.id); }} className="absolute top-5 right-5 p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full transition opacity-0 group-hover:opacity-100 no-print">
                                                    <Icon name="trash-2" size={16} />
                                                </button>
                                                <div className="flex justify-between items-start mb-5">
                                                    <div className="w-16 h-16 bg-slate-50 rounded-2xl border flex items-center justify-center overflow-hidden shadow-inner">
                                                        {p.image ? <img src={p.image} className="w-full h-full object-cover" /> : <Icon name="package" size={24} className="text-slate-200" />}
                                                    </div>
                                                    <span className="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-full uppercase tracking-tighter">{p.skuEngie || 'S/N'}</span>
                                                </div>
                                                <h3 className="font-bold text-slate-800 line-clamp-1 uppercase text-sm mb-1.5">{p.item || 'Sín Nombre'}</h3>
                                                <p className="text-[10px] text-slate-400 font-medium truncate uppercase">{p.razonSocial}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <ProductForm initialData={selectedProduct} onSave={handleSaveAndPDF} isSaving={isSaving} onCancel={() => setCurrentView('list')} />
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        // --- FORMULARIO INTEGRAL (22 CAMPOS + CAPTURA DIRECTA) ---
        function ProductForm({ initialData, onSave, onCancel, isSaving }) {
            const formRef = useRef(null);
            const [form, setForm] = useState(initialData || { 
                item: '', sku: '', skuEngie: '', centro: '', codificacion: '', description: '', 
                fabricante: '', marca: '', modelo: '', nParte: '', codigoDesignacion: '', unidadMedida: '',
                eett: '', peso: '', volumen: '', requiereMx: '', contarTotal: '', contarCompleto: '',
                proveedor: 'ELECTRICO', razonSocial: 'DEL SOLAR TRUCK & CARS SPA', rut: '76.779.159-3', 
                direccion: 'AV. MANQUEHUE SUR # 520', telefono: '963355961', whatsapp: '+569-47436919',
                contacto: 'ALEJANDRO DEL SOLAR', email: 'sadelsolar@gmail.com', comentarios: '', image: null 
            });

            const handleImg = (e) => {
                const f = e.target.files[0];
                if (f) { const r = new FileReader(); r.onload = (ev) => setForm({...form, image: ev.target.result}); r.readAsDataURL(f); }
            };

            const nullCheck = (val) => val || '-';

            return (
                <div className="max-w-7xl mx-auto space-y-4 pb-16 transition-all" ref={formRef}>
                    <div className="bg-white p-10 lg:p-14 rounded-[3rem] shadow-2xl border border-slate-200 grid grid-cols-12 gap-10">
                        
                        {/* ENCABEZADO PDF (Solo visible en captura) */}
                        <div className="col-span-12 flex justify-between items-end border-b-4 border-slate-900 pb-6 mb-8 pdf-only hidden" style={{display: 'none'}}>
                            <div>
                                <h1 className="text-4xl font-black text-slate-900 uppercase tracking-tighter leading-none">{nullCheck(form.item)}</h1>
                                <p className="text-blue-600 font-bold text-xs tracking-[0.4em] uppercase mt-2">Ficha Técnica Oficial</p>
                            </div>
                            <p className="text-xl font-black text-slate-900">{nullCheck(form.skuEngie)}</p>
                        </div>

                        {/* 1. ADJUNTOS */}
                        <div className="col-span-4 space-y-6">
                            <span className="section-tag">Fotografía & Adjuntos</span>
                            <div className="aspect-square bg-slate-50 border-2 border-dashed border-slate-200 rounded-[2.5rem] flex flex-col items-center justify-center p-6 relative overflow-hidden group hover:border-blue-400 transition cursor-pointer">
                                {form.image ? <img src={form.image} className="w-full h-full object-contain" /> : <div className="text-center"><Icon name="image" size={48} className="text-slate-200 mx-auto mb-2"/><p className="text-[10px] text-slate-400 font-black uppercase tracking-widest">Subir Imagen</p></div>}
                                <input type="file" onChange={handleImg} className="absolute inset-0 opacity-0 cursor-pointer no-print" />
                            </div>
                            <div className="p-4 bg-blue-50 border border-blue-100 rounded-3xl no-print">
                                <label className="text-[10px] font-black text-blue-800 uppercase block mb-3 text-center">FICHA TÉCNICA PROVEEDOR</label>
                                <label className="flex items-center justify-center gap-3 px-4 py-3 bg-white border border-blue-200 rounded-2xl cursor-pointer hover:shadow-md transition shadow-sm">
                                    <Icon name="upload-cloud" className="text-blue-600" />
                                    <span className="text-[10px] font-black text-slate-500 uppercase tracking-tighter">Adjuntar PDF</span>
                                    <input type="file" className="hidden" accept="application/pdf" />
                                </label>
                            </div>
                        </div>

                        {/* 2. INFO TÉCNICA */}
                        <div className="col-span-8 space-y-6">
                            <span className="section-tag">Información Técnica del Item</span>
                            <div className="grid grid-cols-3 gap-3">
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Item *</label><input className="input-dense" value={form.item} onChange={e => setForm({...form, item: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">sku</label><input className="input-dense" value={form.sku} onChange={e => setForm({...form, sku: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">sku engie</label><input className="input-dense" value={form.skuEngie} onChange={e => setForm({...form, skuEngie: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Marca</label><input className="input-dense" value={form.marca} onChange={e => setForm({...form, marca: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Modelo</label><input className="input-dense" value={form.modelo} onChange={e => setForm({...form, modelo: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">N° de Parte</label><input className="input-dense" value={form.nParte} onChange={e => setForm({...form, nParte: e.target.value})} /></div>
                                <div className="col-span-3"><label className="text-[10px] font-black text-slate-400 uppercase">Descripción (40 carac.)</label><input className="input-dense" value={form.description} onChange={e => setForm({...form, description: e.target.value})} maxLength="40" /></div>
                            </div>
                        </div>

                        {/* 3. EETT */}
                        <div className="col-span-12 space-y-4 pt-4 border-t EETT-block">
                            <span className="section-tag">Especificaciones Técnicas (EETT)</span>
                            <textarea className="input-dense h-32 font-mono text-[11px] leading-relaxed" value={form.eett} onChange={e => setForm({...form, eett: e.target.value})} placeholder="Detalle técnico completo..."></textarea>
                            <div className="grid grid-cols-3 gap-4">
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Peso</label><input className="input-dense" value={form.peso} onChange={e => setForm({...form, peso: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Volumen</label><input className="input-dense" value={form.volumen} onChange={e => setForm({...form, volumen: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">u. medida</label><input className="input-dense" value={form.unidadMedida} onChange={e => setForm({...form, unidadMedida: e.target.value})} /></div>
                            </div>
                        </div>

                        {/* 4. PROVEEDOR EDITABLE */}
                        <div className="col-span-12 space-y-4 pt-6 border-t PROV-block">
                            <span className="section-tag">Información del Proveedor (Edición Activa)</span>
                            <div className="bg-slate-50 p-8 rounded-[2rem] border border-slate-200 grid grid-cols-2 gap-x-12 gap-y-4">
                                <div className="flex items-center gap-4"><label className="w-32 text-[10px] font-black text-slate-400 uppercase text-right">Razón Social</label><input className="input-dense bg-white" value={form.razonSocial} onChange={e => setForm({...form, razonSocial: e.target.value})} /></div>
                                <div className="flex items-center gap-4"><label className="w-32 text-[10px] font-black text-slate-400 uppercase text-right">RUT</label><input className="input-dense bg-white" value={form.rut} onChange={e => setForm({...form, rut: e.target.value})} /></div>
                                <div className="flex items-center gap-4"><label className="w-32 text-[10px] font-black text-slate-400 uppercase text-right">WhatsApp</label><input className="input-dense bg-white" value={form.whatsapp} onChange={e => setForm({...form, whatsapp: e.target.value})} /></div>
                                <div className="flex items-center gap-4"><label className="w-32 text-[10px] font-black text-slate-400 uppercase text-right">Email</label><input className="input-dense bg-white" value={form.email} onChange={e => setForm({...form, email: e.target.value})} /></div>
                            </div>
                        </div>

                        {/* LOGÍSTICA (Oculto en PDF para ahorrar espacio si está vacío) */}
                        <div className="col-span-12 space-y-4 pt-6 border-t LOG-block no-print">
                            <span className="section-tag">Logística & Stock (Solo Interno)</span>
                            <div className="grid grid-cols-3 gap-6 mb-2">
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Requiere Mx Bodega</label><input className="input-dense" value={form.requiereMx} onChange={e => setForm({...form, requiereMx: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Contar Total</label><input type="number" className="input-dense" value={form.contarTotal} onChange={e => setForm({...form, contarTotal: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Contar Completo</label><input type="number" className="input-dense" value={form.contarCompleto} onChange={e => setForm({...form, contarCompleto: e.target.value})} /></div>
                            </div>
                        </div>

                        {/* PIE PDF */}
                        <div className="col-span-12 text-center border-t border-slate-100 pt-6 mt-10 pdf-only hidden" style={{display: 'none'}}>
                            <p className="text-[9px] font-black text-slate-300 uppercase tracking-[0.5em]">Documento de Gestión por misdocumentosapp.com</p>
                        </div>

                        {/* BOTONES ACCIÓN */}
                        <div className="col-span-12 flex justify-end gap-4 border-t pt-10 no-print">
                            <button onClick={onCancel} className="px-10 py-4 bg-slate-100 text-slate-500 rounded-2xl font-black uppercase text-[11px] tracking-widest hover:bg-slate-200 transition">Cancelar</button>
                            <button onClick={() => onSave(form, formRef.current)} disabled={isSaving} className="px-12 py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-[11px] tracking-widest shadow-xl shadow-blue-100 transition active:scale-95 disabled:opacity-50 flex items-center gap-4">
                                {isSaving ? <Icon name="refresh-cw" className="animate-spin" /> : <Icon name="save" />}
                                {isSaving ? 'Sincronizando PDF...' : 'Guardar y Generar PDF Oficial'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
