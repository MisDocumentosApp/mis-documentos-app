<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosistema AI - Inventario Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; overflow-x: hidden; }
        
        /* Estilos Web */
        .input-field {
            background-color: #fcfcfc; border: 1px solid #e2e8f0; padding: 10px 14px;
            font-size: 0.85rem; border-radius: 12px; width: 100%; outline: none; transition: all 0.2s;
        }
        .input-field:focus { border-color: #2563eb; background-color: #fff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.05em; }
        
        .sidebar { background-color: #0f172a; width: 280px; min-height: 100vh; position: fixed; left: 0; top: 0; z-index: 50; }
        .main-content { margin-left: 280px; padding: 40px; width: calc(100% - 280px); }
        
        .section-title { font-size: 11px; font-weight: 900; color: #2563eb; text-transform: uppercase; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .section-title::before { content: ""; width: 6px; height: 6px; background-color: #2563eb; border-radius: 50%; }

        /* --- ARQUITECTURA PDF OFICIO (SOLUCIÓN BLANCO) --- */
        #pdf-template {
            width: 216mm; 
            background: white;
            position: absolute;
            left: -10000px; /* Fuera de vista pero cargado */
            top: 0;
            z-index: -1;
        }
        .pdf-box { border: 1.5px solid #e2e8f0; padding: 10px; border-radius: 8px; font-size: 13px; color: #1e293b; min-height: 38px; background: #fff; }
        .pdf-label { font-size: 9px; font-weight: 900; color: #64748b; text-transform: uppercase; margin-bottom: 3px; }

        @media (max-width: 1024px) { .sidebar { display: none; } .main-content { margin-left: 0; width: 100%; } }
    </style>
</head>
<body class="flex">

    <aside class="sidebar text-white flex flex-col p-8 no-print">
        <div class="mb-12">
            <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">Mis Documentos</h1>
            <p class="text-[10px] text-blue-400 font-bold uppercase tracking-[0.3em] mt-2">Ecosistema AI</p>
        </div>
        <nav class="space-y-4">
            <button onclick="changeView('form')" class="w-full flex items-center gap-4 text-sm font-bold p-4 rounded-2xl hover:bg-slate-800 transition"><span>⊕</span> Nuevo Registro</button>
            <button onclick="changeView('history')" class="w-full flex items-center gap-4 text-sm font-bold p-4 rounded-2xl hover:bg-slate-800 transition"><span>📋</span> Ver Historial</button>
        </nav>
    </aside>

    <main class="main-content">
        
        <div id="view-form">
            <header class="flex justify-between items-center mb-10">
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Gestión de Insumos / Entrada</h2>
                <button onclick="resetAll()" class="text-[10px] font-bold text-red-400 uppercase">Limpiar Campos</button>
            </header>

            <div class="bg-white rounded-[60px] p-10 lg:p-16 shadow-2xl border border-slate-100">
                <form id="supplyForm" onsubmit="saveData(event)">
                    <div class="grid grid-cols-12 gap-10">
                        <div class="col-span-12 lg:col-span-4 space-y-6">
                            <label>Imagen del Insumo</label>
                            <div onclick="document.getElementById('fileIn').click()" class="aspect-square bg-slate-50 border-2 border-dashed border-slate-200 rounded-[40px] flex items-center justify-center cursor-pointer overflow-hidden relative group">
                                <img id="imgPreview" class="hidden absolute inset-0 w-full h-full object-contain p-4">
                                <div id="labelPlaceholder" class="text-center group-hover:scale-110 transition">
                                    <span class="text-3xl block mb-2">📸</span>
                                    <p class="text-[9px] font-black text-slate-400 uppercase">Haga clic para subir foto</p>
                                </div>
                            </div>
                            <input type="file" id="fileIn" class="hidden" accept="image/*" onchange="preview(this)">
                        </div>

                        <div class="col-span-12 lg:col-span-8 space-y-10">
                            <div>
                                <h3 class="section-title">Información Técnica</h3>
                                <div class="grid grid-cols-3 gap-4">
                                    <div class="col-span-3"><label>Item / Nombre *</label><input type="text" name="item" class="input-field" required></div>
                                    <div><label>SKU</label><input type="text" name="sku" class="input-field"></div>
                                    <div><label>SKU ENGE</label><input type="text" name="skuEnge" class="input-field"></div>
                                    <div><label>Centro</label><input type="text" name="centro" class="input-field"></div>
                                    <div><label>Codificación</label><input type="text" name="cod" class="input-field"></div>
                                    <div><label>Fabricante</label><input type="text" name="fab" class="input-field"></div>
                                    <div><label>Marca</label><input type="text" name="marca" class="input-field"></div>
                                    <div><label>Modelo</label><input type="text" name="modelo" class="input-field"></div>
                                    <div><label>N° Parte</label><input type="text" name="parte" class="input-field"></div>
                                    <div><label>Cód. Designación</label><input type="text" name="codD" class="input-field"></div>
                                    <div class="col-span-2"><label>Descripción Breve</label><input type="text" name="descB" class="input-field"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-12 gap-10 mt-10 pt-10 border-t border-slate-100">
                        <div class="col-span-12 lg:col-span-6 space-y-8">
                            <h3 class="section-title">Datos del Proveedor</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label>Nombre / Razón Social</label><input type="text" name="pNom" class="input-field"></div>
                                <div><label>RUT / Tax ID</label><input type="text" name="pRut" class="input-field"></div>
                                <div><label>Contacto Vendedor</label><input type="text" name="pCont" class="input-field"></div>
                                <div><label>Email / Teléfono</label><input type="text" name="pMail" class="input-field"></div>
                            </div>
                        </div>
                        <div class="col-span-12 lg:col-span-6 space-y-8">
                            <h3 class="section-title">Dimensiones y Estado</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label>Peso</label><input type="text" name="peso" class="input-field"></div>
                                <div><label>Volumen</label><input type="text" name="vol" class="input-field"></div>
                                <div><label>U. Medida</label><input type="text" name="med" class="input-field"></div>
                                <div><label>Estado</label><select name="estado" class="input-field font-bold text-blue-600"><option value="ACTIVO">ACTIVO</option><option value="INACTIVO">INACTIVO</option></select></div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-10"><label>Especificaciones Técnicas (EETT)</label><textarea name="eett" rows="3" class="input-field font-mono text-xs"></textarea></div>

                    <div class="mt-10 pt-10 border-t border-slate-100">
                        <h3 class="section-title">Logística & Stock</h3>
                        <div class="grid grid-cols-3 gap-6 mb-6">
                            <div><label>Req. Bodega</label><input type="text" name="logB" class="input-field"></div>
                            <div><label>Total</label><input type="number" name="logT" class="input-field"></div>
                            <div><label>Contar Completo</label><input type="text" name="logC" class="input-field"></div>
                        </div>
                        <textarea name="logCom" rows="2" class="input-field" placeholder="Ubicación física / Comentarios adicionales..."></textarea>
                    </div>

                    <div class="mt-12 flex justify-end">
                        <button type="submit" id="btnSave" class="bg-blue-600 text-white px-20 py-6 rounded-[25px] font-black text-[12px] shadow-2xl hover:bg-blue-700 transition active:scale-95 uppercase tracking-widest">📄 Guardar Registro</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="view-history" class="hidden">
            <h2 class="text-3xl font-black text-slate-800 mb-10 tracking-tighter uppercase">Historial de Insumos</h2>
            <div class="bg-white rounded-[40px] shadow-xl overflow-hidden border border-slate-100">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase">Item</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase">Identificador</th>
                            <th class="p-6 text-right text-[10px] font-black text-slate-400 uppercase">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="pdf-template">
        <div style="border-bottom: 5px solid #2563eb; padding-bottom: 20px; margin-bottom: 35px; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="font-size: 32px; font-weight: 900; color: #0f172a; margin: 0; text-transform: uppercase;">Ficha Técnica</h1>
                <p style="color: #2563eb; font-weight: 800; font-size: 12px; margin: 5px 0 0 0;">ECOSISTEMA AI - GESTIÓN PROFESIONAL</p>
            </div>
            <div style="text-align: right;">
                <p style="font-size: 10px; color: #94a3b8; font-weight: 900; margin: 0;">EMISIÓN</p>
                <p id="pdfDate" style="font-size: 14px; font-weight: 700; color: #1e293b; margin: 0;"></p>
            </div>
        </div>
        <div id="pdfContent"></div>
    </div>

    <script>
        let currentImgBase64 = "";

        function changeView(view) {
            document.getElementById('view-form').classList.add('hidden');
            document.getElementById('view-history').classList.add('hidden');
            document.getElementById('view-' + view).classList.remove('hidden');
            if(view === 'history') loadHistory();
        }

        function preview(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    currentImgBase64 = e.target.result;
                    document.getElementById('imgPreview').src = currentImgBase64;
                    document.getElementById('imgPreview').classList.remove('hidden');
                    document.getElementById('labelPlaceholder').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function saveData(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSave');
            btn.innerText = "GUARDANDO...";
            btn.disabled = true;

            setTimeout(() => {
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                data.img = currentImgBase64;
                data.id = Date.now();

                const db = JSON.parse(localStorage.getItem('eco_pro_db') || '[]');
                db.unshift(data);
                localStorage.setItem('eco_pro_db', JSON.stringify(db));

                alert("✅ Registrado con éxito.");
                btn.innerText = "📄 GUARDAR REGISTRO";
                btn.disabled = false;
                resetAll();
                changeView('history');
            }, 100);
        }

        function loadHistory() {
            const db = JSON.parse(localStorage.getItem('eco_pro_db') || '[]');
            const container = document.getElementById('historyBody');
            container.innerHTML = db.length ? db.map(r => `
                <tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-6 font-bold text-slate-800 uppercase">${r.item}</td>
                    <td class="p-6 text-slate-400 font-mono text-xs">${r.sku || 'N/A'}</td>
                    <td class="p-6 text-right">
                        <button onclick="downloadPDF(${r.id})" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-black text-[10px] shadow-lg shadow-blue-100 uppercase">PDF Oficio</button>
                        <button onclick="deleteRow(${r.id})" class="ml-4 text-red-300 font-bold text-[10px] uppercase">Eliminar</button>
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="3" class="p-10 text-center text-slate-400 uppercase text-xs">Sin datos</td></tr>';
        }

        function deleteRow(id) {
            if(confirm("¿Eliminar?")) {
                let db = JSON.parse(localStorage.getItem('eco_pro_db') || '[]');
                db = db.filter(x => x.id !== id);
                localStorage.setItem('eco_pro_db', JSON.stringify(db));
                loadHistory();
            }
        }

        async function downloadPDF(id) {
            const db = JSON.parse(localStorage.getItem('eco_pro_db') || '[]');
            const r = db.find(x => x.id === id);
            
            document.getElementById('pdfDate').innerText = new Date(r.id).toLocaleDateString();
            const container = document.getElementById('pdfContent');

            // Renderizado de contenido
            container.innerHTML = `
                <div style="display: flex; gap: 30px; margin-bottom: 35px;">
                    <div style="width: 250px; height: 250px; border: 2px solid #f1f5f9; border-radius: 30px; display: flex; align-items: center; justify-content: center; background: #fff; overflow: hidden;">
                        <img src="${r.img || ''}" style="max-width: 90%; max-height: 90%; object-fit: contain;">
                    </div>
                    <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div style="grid-column: span 2;"><p class="pdf-label">Nombre del Insumo</p><div class="pdf-box" style="font-weight: 800; font-size: 18px; border-color: #2563eb;">${r.item}</div></div>
                        <div><p class="pdf-label">SKU</p><div class="pdf-box">${r.sku}</div></div>
                        <div><p class="pdf-label">SKU ENGE</p><div class="pdf-box">${r.skuEnge}</div></div>
                        <div><p class="pdf-label">Centro</p><div class="pdf-box">${r.centro}</div></div>
                        <div><p class="pdf-label">Fabricante</p><div class="pdf-box">${r.fab}</div></div>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 35px;">
                    <div><p class="pdf-label">Marca</p><div class="pdf-box">${r.marca}</div></div>
                    <div><p class="pdf-label">Modelo</p><div class="pdf-box">${r.modelo}</div></div>
                    <div><p class="pdf-label">Codificación</p><div class="pdf-box">${r.cod}</div></div>
                    <div><p class="pdf-label">Estado</p><div class="pdf-box" style="font-weight: 900; color: #2563eb;">${r.estado}</div></div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 35px;">
                    <div><h4 style="font-size: 11px; color: #2563eb; font-weight: 900; margin-bottom: 10px; border-bottom: 2px solid #f1f5f9; padding-bottom: 5px;">PROVEEDOR</h4>
                        <div style="margin-bottom: 10px;"><p class="pdf-label">Razón Social</p><div class="pdf-box">${r.pNom}</div></div>
                        <div><p class="pdf-label">RUT</p><div class="pdf-box">${r.pRut}</div></div>
                    </div>
                    <div><h4 style="font-size: 11px; color: #2563eb; font-weight: 900; margin-bottom: 10px; border-bottom: 2px solid #f1f5f9; padding-bottom: 5px;">ESPECIFICACIONES (EETT)</h4>
                        <div class="pdf-box" style="min-height: 100px; font-size: 12px; line-height: 1.4; background: #fafafa;">${r.eett}</div>
                    </div>
                </div>
                <div style="background: #f8fafc; padding: 25px; border-radius: 30px; border: 1.5px solid #e2e8f0;">
                    <h4 style="font-size: 10px; color: #64748b; font-weight: 900; margin-bottom: 15px; text-align: center; letter-spacing: 2px;">GESTIÓN LOGÍSTICA</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
                        <div><p class="pdf-label">Bodega</p><div class="pdf-box">${r.logB}</div></div>
                        <div><p class="pdf-label">Contar Total</p><div class="pdf-box">${r.logT}</div></div>
                        <div><p class="pdf-label">Contar Completo</p><div class="pdf-box">${r.logC}</div></div>
                    </div>
                </div>
            `;

            // EL TRUCO PARA ELIMINAR EL PDF EN BLANCO:
            const element = document.getElementById('pdf-template');
            element.style.position = 'static'; // Lo traemos al flujo normal
            element.style.left = '0';
            
            const opt = { 
                margin: 0, 
                filename: `Ficha_${r.item}.pdf`, 
                image: { type: 'jpeg', quality: 0.98 }, 
                html2canvas: { scale: 2.5, useCORS: true, letterRendering: true }, 
                jsPDF: { unit: 'mm', format: 'legal', orientation: 'portrait' } 
            };

            try {
                // Esperamos 300ms a que el navegador termine de renderizar el HTML nuevo
                await new Promise(res => setTimeout(res, 300));
                await html2pdf().set(opt).from(element).save();
            } finally {
                // Lo volvemos a esconder
                element.style.position = 'absolute';
                element.style.left = '-10000px';
            }
        }

        function resetAll() {
            document.getElementById('supplyForm').reset();
            document.getElementById('imgPreview').classList.add('hidden');
            document.getElementById('labelPlaceholder').classList.remove('hidden');
            currentImgBase64 = "";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
