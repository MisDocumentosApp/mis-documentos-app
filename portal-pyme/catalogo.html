<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ficha Comercial Pro - misdocumentosapp.com</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; height: 100vh; overflow: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .nav-item { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 10px; font-weight: 600; font-size: 0.75rem; text-decoration: none; color: #94a3b8; transition: 0.2s; }
        .nav-item.active { background-color: #2563eb; color: white !important; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
        
        /* Ajuste de Alta Densidad PRO (Zoom 100%) */
        .input-dense { width: 100%; padding: 4px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.75rem; outline: none; }
        .input-dense:focus { border-color: #2563eb; background-color: #fcfdfe; }
        .section-tag { font-weight: 800; font-size: 0.58rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #f1f5f9; padding-bottom: 3px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            // --- LÓGICA DE SUPABASE Y MULTIEMPRESA ---
            const [companies] = useState(['Empresa Principal', 'DEL SOLAR TRUCK & CARS SPA']);
            const [activeCompany, setActiveCompany] = useState(localStorage.getItem('catalog_active_company') || companies[0]);
            const [products, setProducts] = useState([]);
            const [currentView, setCurrentView] = useState('list'); 
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [isSaving, setIsSaving] = useState(false);

            // Cargar datos
            useEffect(() => {
                const saved = localStorage.getItem(`catalog_products_${activeCompany}`);
                setProducts(saved ? JSON.parse(saved) : []);
            }, [activeCompany]);

            const handleSave = async (productData) => {
                setIsSaving(true);
                // Usamos setTimeout para liberar el hilo y evitar el error INP
                setTimeout(async () => {
                    const id = productData.id || Date.now();
                    const finalData = { ...productData, id };
                    try {
                        // Aquí iría la lógica de Supabase UPSERT
                        const updatedProducts = productData.id ? products.map(p => p.id === id ? finalData : p) : [finalData, ...products];
                        setProducts(updatedProducts);
                        localStorage.setItem(`catalog_products_${activeCompany}`, JSON.stringify(updatedProducts));
                        alert("✅ Información sincronizada correctamente en la nube.");
                        setCurrentView('list');
                    } catch (e) {
                        alert("❌ Error al sincronizar. Verifique su conexión.");
                    } finally {
                        setIsSaving(false);
                    }
                }, 100);
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* 1. SIDEBAR GLOBAL (Unificado misdocumentosapp.com) */}
                    <aside className="w-60 bg-[#0f172a] p-5 flex flex-col shrink-0 shadow-2xl">
                        <div className="mb-8 text-white px-2">
                            <h2 className="font-extrabold text-lg uppercase italic leading-none tracking-tighter">MIS DOCUMENTOS</h2>
                            <p className="text-blue-500 text-[9px] font-bold tracking-widest uppercase mt-1">Ecosistema AI</p>
                        </div>
                        <div className="p-3 bg-slate-800/50 rounded-xl mb-4 border border-white/5">
                            <span className="text-[9px] text-slate-400 font-black uppercase block mb-2">Empresa Actual</span>
                            <select value={activeCompany} onChange={(e) => setActiveCompany(e.target.value)} className="w-full bg-slate-900 text-white text-xs border-0 rounded-lg p-2 outline-none cursor-pointer">
                                {companies.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <nav className="flex-1 space-y-1">
                            <a href="perfil.html" className="nav-item"><Icon name="user" /> Ficha Comercial</a>
                            <a href="catalogo.html" className="nav-item active"><Icon name="database" /> Catálogo Pro</a>
                            <a href="fichas.html" className="nav-item"><Icon name="file-text" /> Fichas Técnicas</a>
                            <a href="cotizaciones.html" className="nav-item"><Icon name="shopping-cart" /> Cotizaciones</a>
                        </nav>
                        <div className="mt-auto p-4 bg-black/20 rounded-xl text-[7px] text-slate-500 font-bold uppercase border border-white/5">
                            <p>managed by <span className="text-blue-500 font-black">misdocumentosapp.com</span></p>
                        </div>
                    </aside>

                    {/* 2. ÁREA DE TRABAJO (DASHBOARD) */}
                    <main className="flex-1 flex flex-col bg-slate-50 min-w-0 overflow-hidden">
                        <header className="h-14 bg-white border-b px-8 flex items-center justify-between shrink-0">
                            <div className="flex items-center gap-2">
                                <Icon name="chevron-right" size={14} className="text-slate-400" />
                                <h1 className="text-sm font-bold text-slate-800 uppercase tracking-widest">Catálogo Pro</h1>
                            </div>
                            <div className="flex items-center gap-4">
                                {currentView === 'list' && (
                                    <div className="relative w-72 no-print">
                                        <Icon name="search" className="absolute left-3 top-2.5 text-slate-400" size={14} />
                                        <input type="text" placeholder="Buscar por Item, SKU o Descripció..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full bg-slate-100 border-0 rounded-full py-2 pl-9 pr-4 text-xs outline-none focus:ring-2 focus:ring-blue-500" />
                                    </div>
                                )}
                                <span className="text-[9px] font-bold text-slate-400">managed by <span className="text-blue-600">misdocumentosapp.com</span></span>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-6 lg:p-8 custom-scroll bg-slate-50">
                            {currentView === 'list' ? (
                                <div className="max-w-7xl mx-auto space-y-4">
                                    <button onClick={() => { setSelectedProduct(null); setCurrentView('form'); }} className="px-6 py-2 bg-blue-600 text-white text-[10px] font-bold rounded-lg shadow-lg hover:bg-blue-700 transition uppercase">Nuevo Item</button>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {products.filter(p => p.item.toLowerCase().includes(searchTerm.toLowerCase())).map(p => (
                                            <div key={p.id} className="bg-white p-5 rounded-2xl border shadow-sm hover:border-blue-500 transition cursor-pointer" onClick={() => { setSelectedProduct(p); setCurrentView('form'); }}>
                                                <div className="flex justify-between items-start mb-4">
                                                    <div className="w-14 h-14 bg-slate-50 rounded-xl border flex items-center justify-center overflow-hidden">
                                                        {p.image ? <img src={p.image} className="w-full h-full object-cover" /> : <Icon name="package" size={24} className="text-slate-200" />}
                                                    </div>
                                                    <span className="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded uppercase">{p.skuEngie || 'CL-00'}</span>
                                                </div>
                                                <h3 className="font-bold text-slate-800 line-clamp-1 uppercase text-sm">{p.item}</h3>
                                                <p className="text-[10px] text-slate-400 font-medium uppercase mt-1">{p.description || 'Marca Genérica'}</p>
                                                <p className="text-[9px] font-bold text-slate-400 pt-3">managed by <span className="text-blue-600">misdocumentosapp.com</span></p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <ProductForm initialData={selectedProduct} onSave={handleSave} onCancel={() => setCurrentView('list')} isSaving={isSaving}/>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        // --- FORMULARIO DE ALTA DENSIDAD ---
        function ProductForm({ initialData, onSave, onCancel, isSaving }) {
            const [form, setForm] = useState(initialData || { 
                item: '', sku: '', skuEngie: '', centro: '', codificacion: '', description: '', 
                fabricante: '', marca: '', modelo: '', nParte: '', codigoDesignacion: '', unidadMedida: '',
                eett: '', peso: '', volumen: '', requiereMx: '', contarTotal: '', contarCompleto: '',
                proveedor: 'ELECTRICO', razonSocial: 'DEL SOLAR TRUCK & CARS SPA', rut: '76.779.159-3', 
                direccion: 'AV. MANQUEHUE SUR # 520', telefono: '963355961', whatsapp: '+569-47436919',
                contacto: 'ALEJANDRO DEL SOLAR', email: 'sadelsolar@gmail.com', comentarios: '', image: null 
            });

            const handleImg = (e) => {
                const f = e.target.files[0];
                if (f) { const r = new FileReader(); r.onload = (ev) => setForm({...form, image: ev.target.result}); r.readAsDataURL(f); }
            };

            return (
                <div className="max-w-7xl mx-auto space-y-4 pb-10 transition-all">
                    <div className="bg-white p-8 lg:p-12 rounded-[2rem] shadow-2xl border border-slate-200 grid grid-cols-12 gap-10">
                        
                        {/* ADJUNTOS */}
                        <div className="col-span-4 space-y-6">
                            <span className="section-tag">Archivos Adjuntos</span>
                            <div className="aspect-square bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center p-6 relative overflow-hidden group hover:border-blue-400 transition cursor-pointer">
                                {form.image ? <img src={form.image} className="w-full h-full object-contain" /> : <div className="text-center"><Icon name="image" size={48} className="text-slate-200 mx-auto mb-2"/><p className="text-[10px] text-slate-400 font-black uppercase">FOTOGRAFÍA</p></div>}
                                <input type="file" onChange={handleImg} className="absolute inset-0 opacity-0 cursor-pointer" />
                                <span className="absolute bottom-2 text-[8px] font-bold text-slate-300">managed by misdocumentosapp.com</span>
                            </div>
                            <div className="p-4 bg-blue-50 border border-blue-100 rounded-2xl relative">
                                <label className="text-[10px] font-black text-blue-800 uppercase block mb-3">FICHA TÉCNICA (PDF)</label>
                                <label className="flex items-center gap-3 px-4 py-3 bg-white border border-blue-200 rounded-xl cursor-pointer hover:shadow-md transition shadow-sm">
                                    <Icon name="upload-cloud" className="text-blue-600" />
                                    <span className="text-[10px] font-black text-slate-500 uppercase tracking-tighter">Adjuntar PDF</span>
                                    <input type="file" className="hidden" accept="application/pdf" />
                                </label>
                                <span className="absolute bottom-2 left-4 text-[8px] font-bold text-blue-300">managed by misdocumentosapp.com</span>
                            </div>
                        </div>

                        {/* INFO GENERAL */}
                        <div className="col-span-8 space-y-6">
                            <span className="section-tag">Información General (100% Zoom)</span>
                            <div className="grid grid-cols-3 gap-3">
                                <div className="col-span-1"><label className="text-[9px] font-black text-slate-400 uppercase">Item *</label><input className="input-dense" value={form.item} onChange={e => setForm({...form, item: e.target.value})} /></div>
                                <div className="col-span-1"><label className="text-[9px] font-black text-slate-400 uppercase">sku</label><input className="input-dense" value={form.sku} onChange={e => setForm({...form, sku: e.target.value})} /></div>
                                <div className="col-span-1"><label className="text-[9px] font-black text-slate-400 uppercase">sku engie</label><input className="input-dense" value={form.skuEngie} onChange={e => setForm({...form, skuEngie: e.target.value})} /></div>
                                <div className="col-span-1"><label className="text-[9px] font-black text-slate-400 uppercase">centro</label><input className="input-dense" value={form.centro} onChange={e => setForm({...form, centro: e.target.value})} /></div>
                                <div className="col-span-1"><label className="text-[9px] font-black text-slate-400 uppercase">codificación</label><input className="input-dense" value={form.codificacion} onChange={e => setForm({...form, codificacion: e.target.value})} /></div>
                                <div className="col-span-1"><label className="text-[9px] font-black text-slate-400 uppercase">Description (40 carac.)</label><input className="input-dense" value={form.description} onChange={e => setForm({...form, description: e.target.value})} maxLength="40" /></div>
                            </div>

                            {/* FABRICACIÓN */}
                            <span className="section-tag pt-4">Detalles de Fabricación (100% Zoom)</span>
                            <div className="grid grid-cols-3 gap-3">
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Fabricante</label><input className="input-dense" value={form.fabricante} onChange={e => setForm({...form, fabricante: e.target.value})} /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Marca</label><input className="input-dense" value={form.marca} onChange={e => setForm({...form, marca: e.target.value})} /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Modelo</label><input className="input-dense" value={form.modelo} onChange={e => setForm({...form, modelo: e.target.value})} /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">N° de Parte</label><input className="input-dense" value={form.nParte} onChange={e => setForm({...form, nParte: e.target.value})} /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Código Designación</label><input className="input-dense" value={form.codigoDesignacion} onChange={e => setForm({...form, codigoDesignacion: e.target.value})} /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">unidad de medida</label><input className="input-dense" placeholder="Ej: C/U" value={form.unidadMedida} onChange={e => setForm({...form, unidadMedida: e.target.value})} /></div>
                            </div>
                        </div>

                        {/* EETT */}
                        <div className="col-span-12 space-y-4 pt-6 border-t relative">
                            <span className="section-tag">Especificaciones Técnicas (EETT) (100% Zoom)</span>
                            <textarea className="input-dense h-28 font-mono text-[11px]" placeholder="Ingrese especificaciones técnicas detalladas (manage by misdocumentosapp.com)..." value={form.eett} onChange={e => setForm({...form, eett: e.target.value})}></textarea>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Peso</label><input className="input-dense" placeholder="Ej: 1.270 grs" value={form.peso} onChange={e => setForm({...form, peso: e.target.value})} /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Volumen</label><input className="input-dense" placeholder="Ej: SIZE 3" value={form.volumen} onChange={e => setForm({...form, volumen: e.target.value})} /></div>
                            </div>
                            <span className="absolute top-2 right-4 text-[8px] font-bold text-slate-300">managed by misdocumentosapp.com</span>
                        </div>

                        {/* PROVEEDOR */}
                        <div className="col-span-12 space-y-4 pt-6 border-t relative">
                            <span className="section-tag">Información del Proveedor (100% Zoom)</span>
                            <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 grid grid-cols-2 gap-x-8 gap-y-3 text-[11px] font-bold text-slate-800">
                                <div>PROVEEDOR: <span className="font-medium text-slate-600">{form.proveedor}</span></div>
                                <div>RAZÓN SOCIAL: <span className="font-medium text-slate-600">{form.razonSocial}</span></div>
                                <div>RUT: <span className="font-medium text-slate-600">{form.rut}</span></div>
                                <div>DIRECCIÓN: <span className="font-medium text-slate-600">{form.direccion}</span></div>
                                <div>TELÉFONO: <span className="font-medium text-slate-600">{form.telefono}</span></div>
                                <div>WHATSAPP: <span className="font-medium text-slate-600">{form.whatsapp}</span></div>
                                <div>CONTACTO: <span className="font-medium text-slate-600">{form.contacto}</span></div>
                                <div>EMAIL: <span className="font-medium text-slate-600">{form.email}</span></div>
                            </div>
                            <span className="absolute top-2 right-4 text-[8px] font-bold text-slate-300">managed by misdocumentosapp.com</span>
                        </div>

                        {/* LOGÍSTICA */}
                        <div className="col-span-12 space-y-4 pt-6 border-t relative">
                            <span className="section-tag">Logística y Stock (100% Zoom)</span>
                            <div className="grid grid-cols-12 gap-4">
                                <div className="col-span-4"><label className="text-[9px] font-black text-slate-400 uppercase">Requiere Mx en Bodega</label><input className="input-dense" value={form.requiereMx} onChange={e => setForm({...form, requiereMx: e.target.value})} /></div>
                                <div className="col-span-4"><label className="text-[9px] font-black text-slate-400 uppercase">Contar Total</label><input type="number" className="input-dense" value={form.contarTotal} onChange={e => setForm({...form, contarTotal: e.target.value})} /></div>
                                <div className="col-span-4"><label className="text-[9px] font-black text-slate-400 uppercase">Contar Completo</label><input type="number" className="input-dense" value={form.contarCompleto} onChange={e => setForm({...form, contarCompleto: e.target.value})} /></div>
                            </div>
                            <textarea className="input-dense h-20 font-mono text-[11px]" placeholder="Comentarios / Stock / Otros (managed by misdocumentosapp.com)" value={form.comentarios} onChange={e => setForm({...form, comentarios: e.target.value})}></textarea>
                            <span className="absolute top-2 right-4 text-[8px] font-bold text-slate-300">managed by misdocumentosapp.com</span>
                        </div>

                        {/* BOTONES AZULES */}
                        <div className="col-span-12 flex justify-end gap-4 border-t pt-8 no-print relative">
                            <button onClick={onCancel} className="px-8 py-3 bg-slate-100 text-slate-500 rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-slate-200 transition">Volver</button>
                            <button onClick={() => onSave(form)} disabled={isSaving} className="px-10 py-3 bg-blue-600 text-white rounded-xl font-black uppercase text-[10px] tracking-widest shadow-lg shadow-blue-200 transition active:scale-95 disabled:opacity-50 flex items-center gap-2">
                                {isSaving ? <Icon name="refresh-cw" className="animate-spin" /> : <Icon name="save" />}
                                {isSaving ? 'Guardando en Nube...' : 'Guardar Producto (Oficio)'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
