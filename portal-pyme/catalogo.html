<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro - Ecosistema AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; overflow-x: hidden; }
        
        /* Estilos UI Web */
        .input-field {
            background-color: #fcfcfc; border: 1px solid #e2e8f0; padding: 10px 14px;
            font-size: 0.85rem; border-radius: 12px; width: 100%; outline: none; transition: all 0.2s;
        }
        .input-field:focus { border-color: #2563eb; background-color: #fff; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 0.05em; }
        
        .sidebar { background-color: #0f172a; width: 280px; min-height: 100vh; position: fixed; left: 0; top: 0; z-index: 40; }
        .main-content { margin-left: 280px; padding: 40px; width: calc(100% - 280px); }
        
        .section-title { font-size: 11px; font-weight: 900; color: #2563eb; text-transform: uppercase; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .section-title::before { content: ""; width: 6px; height: 6px; background-color: #2563eb; border-radius: 50%; }

        /* --- ARQUITECTURA PARA PDF (TAMAÑO OFICIO / LEGAL) --- */
        #pdf-template {
            width: 216mm; /* Ancho real Oficio */
            min-height: 356mm; /* Largo real Oficio */
            padding: 15mm;
            background: white;
            position: absolute;
            left: -9999px;
            top: 0;
        }
        .pdf-box { border: 1.5px solid #e2e8f0; padding: 8px 12px; border-radius: 8px; font-size: 13px; color: #1e293b; min-height: 38px; background: #fff; }
        .pdf-label { font-size: 9px; font-weight: 900; color: #64748b; text-transform: uppercase; margin-bottom: 2px; }

        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; width: 100%; }
        }
    </style>
</head>
<body class="flex">

    <aside class="sidebar text-white flex flex-col p-8 no-print">
        <div class="mb-12">
            <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">Mis Documentos</h1>
            <p class="text-[10px] text-blue-400 font-bold uppercase tracking-[0.3em] mt-2">Ecosistema AI</p>
        </div>
        <nav class="space-y-4">
            <button onclick="changeView('form')" class="w-full flex items-center gap-4 text-sm font-bold p-4 rounded-2xl hover:bg-slate-800 transition">
                <span>⊕</span> Nuevo Registro
            </button>
            <button onclick="changeView('history')" class="w-full flex items-center gap-4 text-sm font-bold p-4 rounded-2xl hover:bg-slate-800 transition">
                <span>📋</span> Ver Historial
            </button>
        </nav>
    </aside>

    <main class="main-content">
        
        <div id="view-form">
            <header class="flex justify-between items-center mb-8">
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Gestión de Insumos / Entrada</h2>
                <button onclick="resetAll()" class="text-[10px] font-bold text-red-400 uppercase hover:text-red-600 transition">Limpiar Campos</button>
            </header>

            <div class="bg-white rounded-[50px] p-10 lg:p-14 shadow-2xl border border-slate-100">
                <form id="mainForm" onsubmit="saveEntry(event)">
                    <div class="grid grid-cols-12 gap-10">
                        <div class="col-span-12 lg:col-span-4 space-y-6">
                            <label>Imagen del Insumo</label>
                            <div onclick="document.getElementById('fileIn').click()" class="aspect-square bg-slate-50 border-2 border-dashed border-slate-200 rounded-[40px] flex items-center justify-center cursor-pointer overflow-hidden relative group">
                                <img id="imgPreview" class="hidden absolute inset-0 w-full h-full object-contain p-4">
                                <div id="imgPlaceholder" class="text-center group-hover:scale-110 transition">
                                    <span class="text-3xl block mb-2">📸</span>
                                    <p class="text-[9px] font-black text-slate-400 uppercase">Click para subir</p>
                                </div>
                            </div>
                            <input type="file" id="fileIn" class="hidden" accept="image/*" onchange="previewFile(this)">
                            
                            <div class="bg-blue-50/50 p-6 rounded-3xl border border-blue-100 text-center">
                                <p class="text-[9px] font-black text-blue-600 uppercase mb-2">Documento Adjunto</p>
                                <button type="button" class="text-[10px] font-bold bg-white border border-blue-200 px-4 py-2 rounded-xl text-blue-600">📎 ADJUNTAR PDF</button>
                            </div>
                        </div>

                        <div class="col-span-12 lg:col-span-8 space-y-10">
                            <div>
                                <h3 class="section-title">Información Técnica</h3>
                                <div class="grid grid-cols-3 gap-4">
                                    <div class="col-span-3"><label>Item / Nombre *</label><input type="text" name="item" class="input-field" required></div>
                                    <div><label>SKU</label><input type="text" name="sku" class="input-field"></div>
                                    <div><label>SKU ENGE</label><input type="text" name="skuEnge" class="input-field"></div>
                                    <div><label>Centro</label><input type="text" name="centro" class="input-field"></div>
                                    <div><label>Codificación</label><input type="text" name="cod" class="input-field"></div>
                                    <div><label>Fabricante</label><input type="text" name="fab" class="input-field"></div>
                                    <div><label>Marca</label><input type="text" name="marca" class="input-field"></div>
                                    <div><label>Modelo</label><input type="text" name="modelo" class="input-field"></div>
                                    <div><label>N° Parte</label><input type="text" name="parte" class="input-field"></div>
                                    <div><label>Cód. Designación</label><input type="text" name="codD" class="input-field"></div>
                                    <div class="col-span-2"><label>Descripción Breve</label><input type="text" name="descB" class="input-field"></div>
                                </div>
                            </div>

                            <div class="pt-8 border-t border-slate-100">
                                <h3 class="section-title">Datos del Proveedor</h3>
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label>Razón Social</label><input type="text" name="pNom" class="input-field"></div>
                                    <div><label>RUT / Tax ID</label><input type="text" name="pRut" class="input-field"></div>
                                    <div><label>Contacto Vendedor</label><input type="text" name="pCont" class="input-field"></div>
                                    <div><label>Email / Teléfono</label><input type="text" name="pMail" class="input-field"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-10"><label>Especificaciones Técnicas (EETT)</label><textarea name="eett" rows="3" class="input-field font-mono text-xs"></textarea></div>

                    <div class="grid grid-cols-4 gap-4 mt-8">
                        <div><label>Peso</label><input type="text" name="peso" class="input-field"></div>
                        <div><label>Volumen</label><input type="text" name="vol" class="input-field"></div>
                        <div><label>U. Medida</label><input type="text" name="med" class="input-field"></div>
                        <div><label>Estado</label><select name="estado" class="input-field font-bold text-blue-600"><option value="ACTIVO">ACTIVO</option><option value="INACTIVO">INACTIVO</option></select></div>
                    </div>

                    <div class="mt-10 pt-8 border-t border-slate-100">
                        <h3 class="section-title">Logística & Stock</h3>
                        <div class="grid grid-cols-3 gap-6 mb-6">
                            <div><label>Requiere MX Bodega</label><input type="text" name="logB" class="input-field"></div>
                            <div><label>Contar Total</label><input type="number" name="logT" class="input-field"></div>
                            <div><label>Contar Completo</label><input type="text" name="logC" class="input-field"></div>
                        </div>
                        <textarea name="logCom" rows="2" class="input-field" placeholder="Comentarios adicionales..."></textarea>
                    </div>

                    <div class="mt-12 flex justify-end">
                        <button type="submit" id="saveBtn" class="bg-blue-600 text-white px-16 py-5 rounded-[22px] font-black text-[11px] shadow-2xl hover:bg-blue-700 transition active:scale-95 uppercase tracking-widest">📄 Guardar Registro</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="view-history" class="hidden">
            <h2 class="text-2xl font-black text-slate-800 mb-10 tracking-tighter uppercase">Historial de Insumos</h2>
            <div class="bg-white rounded-[40px] shadow-xl overflow-hidden border border-slate-100">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase">Item / SKU</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="pdf-template">
        <div style="border-bottom: 5px solid #2563eb; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="font-size: 32px; font-weight: 900; color: #0f172a; margin: 0; text-transform: uppercase; letter-spacing: -1px;">Ficha Técnica</h1>
                <p style="color: #2563eb; font-weight: 800; font-size: 12px; margin: 5px 0 0 0;">ECOSISTEMA AI - GESTIÓN PROFESIONAL DE ACTIVOS</p>
            </div>
            <div style="text-align: right;">
                <p style="font-size: 10px; color: #94a3b8; font-weight: 900; margin: 0;">FECHA REGISTRO</p>
                <p id="pdf-date-val" style="font-size: 16px; font-weight: 700; color: #1e293b; margin: 0;"></p>
            </div>
        </div>
        <div id="pdf-container-dynamic"></div>
    </div>

    <script>
        let currentImgBase64 = "";

        // Cambiar Vistas
        function changeView(view) {
            document.getElementById('view-form').classList.add('hidden');
            document.getElementById('view-history').classList.add('hidden');
            document.getElementById('view-' + view).classList.remove('hidden');
            if(view === 'history') loadHistory();
        }

        // Previsualizar Imagen
        function previewFile(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    currentImgBase64 = e.target.result;
                    document.getElementById('imgPrev').src = currentImgBase64;
                    document.getElementById('imgPrev').classList.remove('hidden');
                    document.getElementById('imgPlaceholder').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        // Guardar (Fix INP Issue)
        function saveEntry(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            setTimeout(() => {
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                data.img = currentImgBase64;
                data.id = Date.now();

                const db = JSON.parse(localStorage.getItem('eco_docs_db') || '[]');
                db.unshift(data);
                localStorage.setItem('eco_docs_db', JSON.stringify(db));

                alert("✅ Insumo guardado correctamente.");
                btn.innerText = "📄 Guardar Registro";
                btn.disabled = false;
                resetAll();
                changeView('history');
            }, 150);
        }

        // Cargar Historial
        function loadHistory() {
            const db = JSON.parse(localStorage.getItem('eco_docs_db') || '[]');
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = db.length ? db.map(r => `
                <tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-6">
                        <div class="font-bold text-slate-800">${r.item}</div>
                        <div class="text-[10px] text-slate-400 font-mono">${r.sku || 'SIN SKU'}</div>
                    </td>
                    <td class="p-6 text-right">
                        <button onclick="downloadPDF(${r.id})" class="bg-blue-50 text-blue-600 px-5 py-2 rounded-xl font-black text-[10px] uppercase mr-3">PDF Oficio</button>
                        <button onclick="deleteRow(${r.id})" class="text-red-300 font-bold text-[10px] uppercase hover:text-red-500">Eliminar</button>
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="2" class="p-10 text-center text-slate-400 font-bold uppercase text-xs">No hay datos registrados</td></tr>';
        }

        // Borrar
        function deleteRow(id) {
            if(confirm("¿Seguro de eliminar este activo?")) {
                let db = JSON.parse(localStorage.getItem('eco_docs_db') || '[]');
                db = db.filter(x => x.id !== id);
                localStorage.setItem('eco_docs_db', JSON.stringify(db));
                loadHistory();
            }
        }

        // GENERAR PDF OFICIO (RESTAURADO TOTAL)
        async function downloadPDF(id) {
            const db = JSON.parse(localStorage.getItem('eco_docs_db') || '[]');
            const r = db.find(x => x.id === id);
            
            document.getElementById('pdf-date-val').innerText = new Date(r.id).toLocaleDateString();
            const container = document.getElementById('pdf-container-dynamic');

            container.innerHTML = `
                <div style="display: flex; gap: 30px; margin-bottom: 30px;">
                    <div style="width: 240px; height: 240px; border: 2px solid #f1f5f9; border-radius: 25px; display: flex; align-items: center; justify-content: center; background: #fff; overflow: hidden;">
                        <img src="${r.img || ''}" style="max-width: 90%; max-height: 90%; object-fit: contain;">
                    </div>
                    <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div style="grid-column: span 2;"><p class="pdf-label">Nombre del Insumo</p><div class="pdf-box" style="font-weight: 800; font-size: 18px; border-color: #2563eb;">${r.item}</div></div>
                        <div><p class="pdf-label">SKU</p><div class="pdf-box">${r.sku}</div></div>
                        <div><p class="pdf-label">SKU ENGE</p><div class="pdf-box">${r.skuEnge}</div></div>
                        <div><p class="pdf-label">Fabricante</p><div class="pdf-box">${r.fab}</div></div>
                        <div><p class="pdf-label">Marca</p><div class="pdf-box">${r.marca}</div></div>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px;">
                    <div><p class="pdf-label">Centro</p><div class="pdf-box">${r.centro}</div></div>
                    <div><p class="pdf-label">Codificación</p><div class="pdf-box">${r.cod}</div></div>
                    <div><p class="pdf-label">Modelo</p><div class="pdf-box">${r.modelo}</div></div>
                    <div><p class="pdf-label">N° Parte</p><div class="pdf-box">${r.parte}</div></div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px;">
                    <div><h4 style="font-size: 11px; color: #2563eb; text-transform: uppercase; margin-bottom: 10px;">Datos del Proveedor</h4>
                        <p class="pdf-label">Razón Social</p><div class="pdf-box" style="margin-bottom: 10px;">${r.pNom}</div>
                        <p class="pdf-label">RUT / Tax ID</p><div class="pdf-box">${r.pRut}</div>
                    </div>
                    <div><h4 style="font-size: 11px; color: #2563eb; text-transform: uppercase; margin-bottom: 10px;">Dimensiones</h4>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <div><p class="pdf-label">Peso</p><div class="pdf-box">${r.peso}</div></div>
                            <div><p class="pdf-label">Estado</p><div class="pdf-box" style="font-weight: 900; color: #2563eb;">${r.estado}</div></div>
                        </div>
                    </div>
                </div>
                <div style="margin-bottom: 30px;"><p class="pdf-label">Especificaciones Técnicas (EETT)</p><div class="pdf-box" style="min-height: 100px; font-size: 12px; line-height: 1.5; background: #fcfcfc;">${r.eett}</div></div>
                <div style="background: #f8fafc; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0;">
                    <h4 style="font-size: 11px; color: #64748b; text-transform: uppercase; margin-bottom: 15px;">Control Logístico</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                        <div><p class="pdf-label">Bodega</p><div class="pdf-box">${r.logB}</div></div>
                        <div><p class="pdf-label">Contar Total</p><div class="pdf-box">${r.logT}</div></div>
                        <div><p class="pdf-label">Contar Completo</p><div class="pdf-box">${r.logC}</div></div>
                    </div>
                </div>
            `;

            const opt = { margin: 0, filename: `Ficha_${r.item}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2.5, useCORS: true }, jsPDF: { unit: 'mm', format: 'legal', orientation: 'portrait' } };
            await html2pdf().set(opt).from(document.getElementById('pdf-template')).save();
        }

        // Reset
        function resetAll() {
            document.getElementById('mainForm').reset();
            document.getElementById('imgPrev').classList.add('hidden');
            document.getElementById('imgPlaceholder').classList.remove('hidden');
            currentImgBase64 = "";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
