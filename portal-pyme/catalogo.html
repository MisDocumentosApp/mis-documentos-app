<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo Pro - misdocumentosapp.com</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* ALTA DENSIDAD PRO (ZOOM 100%) */
        .input-dense { width: 100%; padding: 6px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.78rem; outline: none; transition: 0.1s; background: white; color: #0f172a; }
        .input-dense:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.05); }
        .section-tag { font-weight: 800; font-size: 0.58rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid #f1f5f9; padding-bottom: 3px; margin-bottom: 10px; display: block; }
        
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 12px; font-weight: 600; font-size: 0.8rem; color: #94a3b8; cursor: pointer; transition: 0.2s; }
        .nav-item.active { background-color: #2563eb; color: white !important; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }

        /* PLANTILLA PDF (OFICIO 216x330mm) */
        #pdf-factory-capture { position: absolute; left: -9999px; top: 0; width: 816px; background: white; z-index: -1; visibility: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // ESTRUCTURA INTEGRAL: TODOS LOS CAMPOS DE TUS CAPTURAS
        const emptyProduct = { 
            id: null, item: '', sku: '', skuEngie: '', centro: '', codificacion: '', description: '', 
            fabricante: '', marca: '', modelo: '', nParte: '', codigoDesignacion: '', unidadMedida: '',
            eett: '', peso: '', volumen: '', requiereMx: '', contarTotal: '', contarCompleto: '',
            proveedor: 'ELECTRICO', razonSocial: 'DEL SOLAR TRUCK & CARS SPA', rut: '76.779.159-3', 
            direccion: 'AV. MANQUEHUE SUR # 520', telefono: '963355961', whatsapp: '+569-47436919',
            contacto: 'ALEJANDRO DEL SOLAR', email: 'sadelsolar@gmail.com', comentarios: '', image: null 
        };

        function App() {
            const [products, setProducts] = useState([]);
            const [currentView, setCurrentView] = useState('list'); 
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                const saved = localStorage.getItem('catalog_v2026_master');
                if (saved) setProducts(JSON.parse(saved));
            }, []);

            const handleSave = (productData) => {
                setIsSaving(true);
                // setTimeout evita el error de bloqueo de interfaz
                setTimeout(() => {
                    const id = productData.id || Date.now();
                    const finalData = { ...productData, id };
                    const updated = productData.id 
                        ? products.map(p => p.id === id ? finalData : p) 
                        : [finalData, ...products];
                    
                    setProducts(updated);
                    localStorage.setItem('catalog_v2026_master', JSON.stringify(updated));
                    
                    setIsSaving(false);
                    setSelectedProduct(finalData);
                    alert("✅ Guardado exitoso. Ahora puede descargar el PDF.");
                }, 150);
            };

            const runPDF = () => {
                if (!selectedProduct) return;
                const element = document.getElementById('pdf-factory-capture');
                element.style.visibility = 'visible';
                const opt = {
                    margin: 0, filename: `Ficha_${selectedProduct.item || 'Insumo'}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                    jsPDF: { unit: 'mm', format: [216, 330], orientation: 'portrait' }
                };
                html2pdf().set(opt).from(element).save().then(() => {
                    element.style.visibility = 'hidden';
                });
            };

            const handleDelete = (id) => {
                if(window.confirm("¿Eliminar este registro permanentemente?")) {
                    const updated = products.filter(p => p.id !== id);
                    setProducts(updated);
                    localStorage.setItem('catalog_v2026_master', JSON.stringify(updated));
                }
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className="w-64 bg-[#0f172a] p-6 flex flex-col shrink-0 shadow-2xl">
                        <div className="mb-10 text-white">
                            <h2 className="font-extrabold text-xl uppercase italic tracking-tighter leading-none">MIS DOCUMENTOS</h2>
                            <p className="text-blue-500 text-[10px] font-bold uppercase mt-1">Ecosistema AI</p>
                        </div>
                        <nav className="flex-1 space-y-2">
                            <div onClick={() => { setSelectedProduct(null); setCurrentView('list'); }} className={`nav-item ${currentView === 'list' ? 'active' : ''}`}><Icon name="database" /> Inventario Pro</div>
                            <div onClick={() => { setSelectedProduct(emptyProduct); setCurrentView('form'); }} className={`nav-item ${currentView === 'form' ? 'active' : ''}`}><Icon name="plus-circle" /> Nuevo Registro</div>
                        </nav>
                        <div className="mt-auto p-4 bg-black/20 rounded-xl text-[7px] text-slate-500 font-bold uppercase border border-white/5">
                            <p>managed by <span className="text-blue-500">misdocumentosapp.com</span></p>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col bg-slate-50 overflow-hidden min-w-0">
                        <header className="h-16 bg-white border-b px-8 flex items-center justify-between shrink-0 shadow-sm z-10">
                            <h1 className="text-sm font-black text-slate-800 uppercase tracking-widest">Panel de Gestión</h1>
                            {isSaving && <span className="text-[10px] font-black text-blue-600 animate-pulse uppercase tracking-widest">Sincronizando...</span>}
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 lg:p-10 custom-scroll">
                            {currentView === 'list' ? (
                                <div className="max-w-7xl mx-auto space-y-6">
                                    <div className="flex justify-between items-center">
                                        <button onClick={() => { setSelectedProduct(emptyProduct); setCurrentView('form'); }} className="px-6 py-2.5 bg-blue-600 text-white text-[11px] font-bold rounded-xl shadow-lg hover:bg-blue-700 uppercase transition">Nuevo Item</button>
                                        <input type="text" placeholder="Filtrar por nombre o SKU..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-80 bg-white border rounded-full px-6 py-2 text-xs outline-none focus:ring-2 focus:ring-blue-500 shadow-sm" />
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {products.filter(p => (p.item || "").toLowerCase().includes(searchTerm.toLowerCase())).map(p => (
                                            <div key={p.id} className="bg-white p-6 rounded-[2rem] border shadow-sm hover:border-blue-500 transition-all cursor-pointer relative group">
                                                {/* BOTÓN ELIMINAR REPARADO */}
                                                <button onClick={(e) => { e.stopPropagation(); handleDelete(p.id); }} className="absolute top-5 right-5 p-2 text-slate-300 hover:text-red-500 transition opacity-0 group-hover:opacity-100"><Icon name="trash-2" size={18} /></button>
                                                <div onClick={() => { setSelectedProduct({...emptyProduct, ...p}); setCurrentView('form'); }}>
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div className="w-16 h-16 bg-slate-50 rounded-2xl border flex items-center justify-center overflow-hidden shadow-inner">
                                                            {p.image ? <img src={p.image} className="w-full h-full object-cover" /> : <Icon name="package" size={24} className="text-slate-200" />}
                                                        </div>
                                                        <span className="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase">{p.skuEngie || 'CL-00'}</span>
                                                    </div>
                                                    <h3 className="font-bold text-slate-800 uppercase text-sm mb-1">{p.item || 'Sín Nombre'}</h3>
                                                    <p className="text-[10px] text-slate-400 font-medium truncate uppercase">{p.razonSocial}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <ProductForm initialData={selectedProduct} onSave={handleSave} onPDF={runPDF} isSaving={isSaving} onCancel={() => setCurrentView('list')} />
                            )}
                        </div>
                    </main>

                    {/* PLANTILLA PDF (OFICIO) */}
                    <div id="pdf-factory-capture">
                        <div style={{ padding: '60px', minHeight: '1248px', color: '#0f172a' }}>
                            <div className="flex justify-between items-end border-b-4 border-slate-900 pb-6 mb-10">
                                <div>
                                    <h1 className="text-4xl font-black text-slate-900 uppercase tracking-tighter leading-none">{selectedProduct?.item}</h1>
                                    <p className="text-blue-600 font-extrabold text-xs tracking-[0.4em] uppercase mt-2">Ficha Técnica Oficial</p>
                                </div>
                                <p className="text-xl font-black text-slate-900">{selectedProduct?.skuEngie || 'S/N'}</p>
                            </div>
                            <div className="grid grid-cols-12 gap-12">
                                <div className="col-span-5">
                                    <div className="aspect-square bg-slate-50 border border-slate-200 rounded-[2.5rem] flex items-center justify-center overflow-hidden">
                                        {selectedProduct?.image ? <img src={selectedProduct.image} className="w-full h-full object-contain p-4" /> : <Icon name="image" size={60} className="text-slate-100" />}
                                    </div>
                                    <div className="mt-10 bg-slate-900 text-white text-[9px] font-black px-5 py-3 uppercase tracking-widest rounded-r-2xl shadow-lg">Proveedor</div>
                                    <div className="mt-6 space-y-4 px-2 text-[12px] text-slate-700 leading-relaxed">
                                        <p><strong>RAZÓN SOCIAL:</strong> <span className="block text-slate-900">{selectedProduct?.razonSocial || '-'}</span></p>
                                        <p><strong>RUT:</strong> <span className="block text-slate-900">{selectedProduct?.rut || '-'}</span></p>
                                        <p><strong>DIRECCIÓN:</strong> <span className="block text-slate-900">{selectedProduct?.direccion || '-'}</span></p>
                                    </div>
                                </div>
                                <div className="col-span-7 space-y-10">
                                    <div className="bg-blue-600 text-white text-[9px] font-black px-5 py-3 uppercase tracking-widest rounded-r-2xl shadow-lg">Especificaciones</div>
                                    <div className="bg-slate-50 p-8 rounded-[2rem] border border-slate-100 min-h-[400px]">
                                        <pre className="text-[13px] font-mono text-slate-800 whitespace-pre-wrap leading-relaxed">{selectedProduct?.eett || 'Sin registro.'}</pre>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 text-[10px] font-bold uppercase text-slate-500 italic bg-slate-100 p-4 rounded-2xl">
                                        <div>Marca: {selectedProduct?.marca}</div>
                                        <div>Modelo: {selectedProduct?.modelo}</div>
                                    </div>
                                </div>
                            </div>
                            <div className="absolute bottom-12 left-12 right-12 text-center border-t pt-6 text-[9px] text-slate-400 font-black uppercase tracking-[0.5em]">managed by misdocumentosapp.com</div>
                        </div>
                    </div>
                </div>
            );
        }

        // FORMULARIO INTEGRAL (22 CAMPOS + SEPARACIÓN DE BOTONES)
        function ProductForm({ initialData, onSave, onPDF, onCancel, isSaving }) {
            const [form, setForm] = useState(initialData || emptyProduct);
            const handleImg = (e) => {
                const f = e.target.files[0];
                if (f) { const r = new FileReader(); r.onload = (ev) => setForm({...form, image: ev.target.result}); r.readAsDataURL(f); }
            };

            return (
                <div className="max-w-7xl mx-auto space-y-4 pb-16 transition-all duration-300">
                    <div className="bg-white p-10 lg:p-14 rounded-[3.5rem] shadow-2xl border border-slate-200 grid grid-cols-12 gap-10">
                        <div className="col-span-4 space-y-6">
                            <span className="section-tag">Fotografía & Adjuntos</span>
                            <div className="aspect-square bg-slate-50 border-2 border-dashed border-slate-200 rounded-[2.5rem] flex flex-col items-center justify-center p-6 relative overflow-hidden group hover:border-blue-400 transition cursor-pointer">
                                {form.image ? <img src={form.image} className="w-full h-full object-contain" /> : <div className="text-center"><Icon name="image" size={48} className="text-slate-200 mx-auto mb-2"/><p className="text-[10px] text-slate-400 font-black uppercase tracking-widest">Subir Foto</p></div>}
                                <input type="file" onChange={handleImg} className="absolute inset-0 opacity-0 cursor-pointer" />
                            </div>
                            <div className="p-4 bg-blue-50 border border-blue-100 rounded-3xl">
                                <label className="text-[10px] font-black text-blue-800 uppercase block mb-3 text-center">FICHA TÉCNICA PROVEEDOR</label>
                                <label className="flex items-center justify-center gap-3 px-4 py-3 bg-white border border-blue-200 rounded-2xl cursor-pointer hover:shadow-md transition">
                                    <Icon name="upload-cloud" className="text-blue-600" />
                                    <span className="text-[10px] font-black text-slate-500 uppercase">Adjuntar PDF</span>
                                    <input type="file" className="hidden" accept="application/pdf" />
                                </label>
                            </div>
                        </div>

                        <div className="col-span-8 space-y-6">
                            <span className="section-tag">Información Técnica del Insumo</span>
                            <div className="grid grid-cols-3 gap-3">
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Item *</label><input className="input-dense" value={form.item} onChange={e => setForm({...form, item: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">sku</label><input className="input-dense" value={form.sku} onChange={e => setForm({...form, sku: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">sku engie</label><input className="input-dense" value={form.skuEngie} onChange={e => setForm({...form, skuEngie: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Centro</label><input className="input-dense" value={form.centro} onChange={e => setForm({...form, centro: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Codificación</label><input className="input-dense" value={form.codificacion} onChange={e => setForm({...form, codificacion: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Description (40c)</label><input className="input-dense" value={form.description} onChange={e => setForm({...form, description: e.target.value})} maxLength="40" /></div>
                            </div>
                            <div className="grid grid-cols-3 gap-3 pt-4 border-t border-slate-50">
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Fabricante</label><input className="input-dense" value={form.fabricante} onChange={e => setForm({...form, fabricante: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Marca</label><input className="input-dense" value={form.marca} onChange={e => setForm({...form, marca: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Modelo</label><input className="input-dense" value={form.modelo} onChange={e => setForm({...form, modelo: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">N° de Parte</label><input className="input-dense" value={form.nParte} onChange={e => setForm({...form, nParte: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Código Designación</label><input className="input-dense" value={form.codigoDesignacion} onChange={e => setForm({...form, codigoDesignacion: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Unidad Medida</label><input className="input-dense" value={form.unidadMedida} onChange={e => setForm({...form, unidadMedida: e.target.value})} /></div>
                            </div>
                        </div>

                        <div className="col-span-12 space-y-4 pt-4 border-t">
                            <span className="section-tag">Especificaciones Técnicas (EETT)</span>
                            <textarea className="input-dense h-28 font-mono text-[11px]" value={form.eett} onChange={e => setForm({...form, eett: e.target.value})} placeholder="Detalle completo técnico..."></textarea>
                            <div className="grid grid-cols-3 gap-4">
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Peso</label><input className="input-dense" value={form.peso} onChange={e => setForm({...form, peso: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Volumen</label><input className="input-dense" value={form.volumen} onChange={e => setForm({...form, volumen: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase">Status</label><input className="input-dense bg-slate-50 font-bold" value="ACTIVO" readOnly /></div>
                            </div>
                        </div>

                        <div className="col-span-12 space-y-4 pt-6 border-t">
                            <span className="section-tag">Información del Proveedor (Editable)</span>
                            <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-200 grid grid-cols-2 gap-x-12 gap-y-4">
                                <div className="flex items-center gap-4"><label className="w-32 text-[10px] font-black text-slate-400 uppercase text-right leading-none">Razón Social</label><input className="input-dense bg-white" value={form.razonSocial} onChange={e => setForm({...form, razonSocial: e.target.value})} /></div>
                                <div className="flex items-center gap-4"><label className="w-32 text-[10px] font-black text-slate-400 uppercase text-right leading-none">RUT</label><input className="input-dense bg-white" value={form.rut} onChange={e => setForm({...form, rut: e.target.value})} /></div>
                                <div className="flex items-center gap-4"><label className="w-32 text-[10px] font-black text-slate-400 uppercase text-right leading-none">WhatsApp</label><input className="input-dense bg-white" value={form.whatsapp} onChange={e => setForm({...form, whatsapp: e.target.value})} /></div>
                                <div className="flex items-center gap-4"><label className="w-32 text-[10px] font-black text-slate-400 uppercase text-right leading-none">Email</label><input className="input-dense bg-white" value={form.email} onChange={e => setForm({...form, email: e.target.value})} /></div>
                            </div>
                        </div>

                        <div className="col-span-12 flex justify-end gap-5 border-t pt-10 no-print">
                            <button onClick={onCancel} className="px-10 py-4 bg-slate-100 text-slate-500 rounded-2xl font-black uppercase text-[11px] tracking-widest hover:bg-slate-200 transition">Volver</button>
                            <button onClick={() => onSave(form)} disabled={isSaving} className="px-12 py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-[11px] shadow-xl shadow-blue-100 transition active:scale-95 disabled:opacity-50 flex items-center gap-4">
                                <Icon name="save" /> {isSaving ? 'Guardando...' : '1. Guardar Cambios'}
                            </button>
                            {form.id && (
                                <button onClick={onPDF} className="px-12 py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-[11px] shadow-xl shadow-slate-200 transition active:scale-95 flex items-center gap-4">
                                    <Icon name="file-text" /> 2. Descargar PDF Oficio
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
