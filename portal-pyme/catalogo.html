<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro - Ecosistema AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; overflow-x: hidden; }
        
        /* Estilos de Interfaz */
        .input-field {
            background-color: #fcfcfc; border: 1px solid #e2e8f0; padding: 12px;
            font-size: 0.85rem; border-radius: 12px; width: 100%; outline: none; transition: all 0.2s;
        }
        .input-field:focus { border-color: #2563eb; background-color: #fff; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.05em; }
        
        .sidebar { background-color: #0f172a; width: 280px; min-height: 100vh; position: fixed; left: 0; top: 0; }
        .main-content { margin-left: 280px; padding: 40px; width: calc(100% - 280px); }
        
        .section-title { font-size: 11px; font-weight: 900; color: #2563eb; text-transform: uppercase; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .section-title::before { content: ""; width: 6px; height: 6px; background-color: #2563eb; border-radius: 50%; }

        /* --- ARQUITECTURA PARA PDF (AJUSTE TOTAL A HOJA OFICIO) --- */
        #pdf-template {
            width: 216mm; /* Ancho real Oficio */
            min-height: 356mm; /* Largo real Oficio */
            padding: 20mm;
            background: white;
            position: absolute;
            left: -9999px; /* Oculto de la vista web */
            top: 0;
        }
        .pdf-data-box { border: 1.5px solid #e2e8f0; padding: 12px; border-radius: 10px; font-size: 14px; color: #1e293b; min-height: 45px; }
        
        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; width: 100%; }
        }
    </style>
</head>
<body class="flex">

    <aside class="sidebar text-white flex flex-col p-8 no-print">
        <div class="mb-12">
            <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">Mis Documentos</h1>
            <p class="text-[10px] text-blue-400 font-bold uppercase tracking-[0.3em] mt-2">Ecosistema AI</p>
        </div>
        <nav class="space-y-4">
            <button onclick="changeView('form')" class="w-full flex items-center gap-4 text-sm font-semibold p-4 rounded-2xl hover:bg-slate-800 transition">
                <span>⊕</span> Nuevo Registro
            </button>
            <button onclick="changeView('history')" class="w-full flex items-center gap-4 text-sm font-semibold p-4 rounded-2xl hover:bg-slate-800 transition">
                <span>📋</span> Ver Historial
            </button>
        </nav>
    </aside>

    <main class="main-content">
        
        <div id="view-form">
            <header class="flex justify-between items-center mb-10">
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Gestión de Insumos / Entrada</h2>
                <button onclick="limpiarFormularioSync()" class="text-[10px] font-bold text-red-400 uppercase hover:text-red-600 transition">Limpiar Campos</button>
            </header>

            <div class="bg-white rounded-[50px] p-10 lg:p-16 shadow-2xl border border-slate-100">
                <form id="mainForm" onsubmit="handleSave(event)">
                    <div class="grid grid-cols-12 gap-12">
                        <div class="col-span-12 lg:col-span-4 space-y-8">
                            <div>
                                <label>Imagen del Insumo</label>
                                <div onclick="document.getElementById('fileIn').click()" class="aspect-square bg-slate-50 border-2 border-dashed border-slate-200 rounded-[40px] flex items-center justify-center cursor-pointer overflow-hidden relative group">
                                    <img id="imgPreview" class="hidden absolute inset-0 w-full h-full object-contain p-4">
                                    <div id="placeholder" class="text-center group-hover:scale-110 transition">
                                        <span class="text-3xl block mb-2">📸</span>
                                        <p class="text-[9px] font-black text-slate-400 uppercase">Click para subir</p>
                                    </div>
                                </div>
                                <input type="file" id="fileIn" class="hidden" accept="image/*" onchange="processImage(this)">
                            </div>
                        </div>

                        <div class="col-span-12 lg:col-span-8 space-y-10">
                            <div>
                                <h3 class="section-title">Información Técnica</h3>
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="col-span-2"><label>Item / Nombre del Insumo *</label><input type="text" name="item" class="input-field" required></div>
                                    <div><label>SKU</label><input type="text" name="sku" class="input-field"></div>
                                    <div><label>Fabricante / Marca</label><input type="text" name="marca" class="input-field"></div>
                                </div>
                            </div>
                            <div class="pt-10 border-t border-slate-100">
                                <h3 class="section-title">Datos del Proveedor</h3>
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label>Razón Social</label><input type="text" name="prov_nombre" class="input-field"></div>
                                    <div><label>RUT / Tax ID</label><input type="text" name="prov_rut" class="input-field"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-10">
                        <label>Especificaciones Técnicas (EETT)</label>
                        <textarea name="eett" rows="4" class="input-field font-mono text-xs"></textarea>
                    </div>

                    <div class="mt-12 flex justify-end">
                        <button type="submit" id="saveBtn" class="bg-blue-600 text-white px-16 py-5 rounded-[22px] font-black text-[11px] shadow-2xl shadow-blue-200 hover:bg-blue-700 transition active:scale-95">
                            📄 GUARDAR REGISTRO
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div id="view-history" class="hidden">
            <h2 class="text-2xl font-black text-slate-800 mb-10 tracking-tighter uppercase">Historial de Activos</h2>
            <div class="bg-white rounded-[40px] shadow-xl overflow-hidden border border-slate-100">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase">Insumo</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase">SKU</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>
        </div>

    </main>

    <div id="pdf-template">
        <div style="border-bottom: 5px solid #2563eb; padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="font-size: 32px; font-weight: 900; color: #0f172a; margin: 0; text-transform: uppercase;">Ficha Técnica</h1>
                <p style="color: #2563eb; font-weight: 800; font-size: 12px; margin: 5px 0 0 0;">Ecosistema AI - Gestión de Inventario Profesional</p>
            </div>
            <div style="text-align: right;">
                <p style="font-size: 10px; color: #94a3b8; font-weight: 900; text-transform: uppercase; margin: 0;">Fecha de Emisión</p>
                <p id="pdf-date" style="font-size: 16px; font-weight: 700; color: #1e293b; margin: 0;"></p>
            </div>
        </div>

        <div id="pdf-content">
            </div>
    </div>

    <script>
        let base64Image = "";

        // Navegación
        function changeView(view) {
            document.getElementById('view-form').classList.add('hidden');
            document.getElementById('view-history').classList.add('hidden');
            document.getElementById('view-' + view).classList.remove('hidden');
            if(view === 'history') renderHistory();
        }

        // Procesar Imagen a Base64
        function processImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    base64Image = e.target.result;
                    document.getElementById('imgPreview').src = base64Image;
                    document.getElementById('imgPreview').classList.remove('hidden');
                    document.getElementById('placeholder').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        // GUARDAR REGISTRO (Fix INP Issue)
        function handleSave(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            // setTimeout para liberar el hilo principal (Elimina INP Issue)
            setTimeout(() => {
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                data.image = base64Image;
                data.id = Date.now();

                const history = JSON.parse(localStorage.getItem('eco_inventario') || '[]');
                history.unshift(data);
                localStorage.setItem('eco_inventario', JSON.stringify(history));

                alert("¡Insumo registrado exitosamente!");
                btn.innerText = "📄 GUARDAR REGISTRO";
                btn.disabled = false;
                limpiarFormularioSync();
                changeView('history');
            }, 100);
        }

        // Renderizar Tabla
        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('eco_inventario') || '[]');
            const container = document.getElementById('table-body');
            container.innerHTML = history.length ? history.map(item => `
                <tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-6 font-bold text-slate-800">${item.item}</td>
                    <td class="p-6 text-slate-500 font-mono text-xs">${item.sku || 'N/A'}</td>
                    <td class="p-6 text-right">
                        <button onclick="generatePDF(${item.id})" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg font-black text-[10px] uppercase mr-2 hover:bg-blue-600 hover:text-white transition">PDF Oficio</button>
                        <button onclick="deleteItem(${item.id})" class="text-red-300 font-bold text-[10px] uppercase hover:text-red-600">Eliminar</button>
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="3" class="p-10 text-center text-slate-400 font-bold uppercase text-xs">No hay registros guardados</td></tr>';
        }

        // Borrar Registro
        function deleteItem(id) {
            if(confirm("¿Seguro que desea eliminar este registro?")) {
                let history = JSON.parse(localStorage.getItem('eco_inventario') || '[]');
                history = history.filter(i => i.id !== id);
                localStorage.setItem('eco_inventario', JSON.stringify(history));
                renderHistory();
            }
        }

        // GENERAR PDF (AJUSTE TOTAL A OFICIO)
        async function generatePDF(id) {
            const history = JSON.parse(localStorage.getItem('eco_inventario') || '[]');
            const item = history.find(i => i.id === id);
            
            document.getElementById('pdf-date').innerText = new Date().toLocaleDateString();
            
            const content = document.getElementById('pdf-content');
            content.innerHTML = `
                <div style="display: flex; gap: 40px; margin-bottom: 40px;">
                    <div style="width: 250px; height: 250px; border-radius: 30px; border: 2px solid #f1f5f9; overflow: hidden; display: flex; align-items: center; justify-content: center; background: white;">
                        <img src="${item.image || ''}" style="max-width: 90%; max-height: 90%; object-fit: contain;">
                    </div>
                    <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div style="grid-column: span 2;"><label style="font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Nombre Item</label><div class="pdf-data-box" style="font-weight: 800; font-size: 18px;">${item.item}</div></div>
                        <div><label style="font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">SKU</label><div class="pdf-data-box">${item.sku}</div></div>
                        <div><label style="font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Fabricante</label><div class="pdf-data-box">${item.marca}</div></div>
                        <div><label style="font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Proveedor</label><div class="pdf-data-box">${item.prov_nombre}</div></div>
                        <div><label style="font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">RUT</label><div class="pdf-data-box">${item.prov_rut}</div></div>
                    </div>
                </div>
                <div>
                    <label style="font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Especificaciones Técnicas (EETT)</label>
                    <div style="border: 1.5px solid #e2e8f0; padding: 20px; border-radius: 15px; font-size: 13px; line-height: 1.6; min-height: 200px; background: #fafafa;">
                        ${item.eett ? item.eett.replace(/\n/g, '<br>') : 'Sin especificaciones técnicas registradas.'}
                    </div>
                </div>
            `;

            const opt = {
                margin: 0,
                filename: `Ficha_${item.item.replace(/ /g, '_')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'legal', orientation: 'portrait' }
            };

            const element = document.getElementById('pdf-template');
            await html2pdf().set(opt).from(element).save();
        }

        // Limpiar
        function limpiarFormularioSync() {
            setTimeout(() => {
                document.getElementById('mainForm').reset();
                document.getElementById('imgPreview').classList.add('hidden');
                document.getElementById('placeholder').classList.remove('hidden');
                base64Image = "";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 50);
        }
    </script>
</body>
</html>
