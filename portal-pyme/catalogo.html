<body class="bg-[#f8fafc] font-sans h-screen flex overflow-hidden text-slate-900">

        <div class="mt-auto p-6 bg-black/20 text-[9px] text-slate-500 font-black uppercase tracking-widest leading-relaxed">
            <p>microempresasaunclick@gmail.com</p>
            <p>sadelsolar@gmail.com</p>
            <p class="text-blue-500 mt-2">+569 4743 6919</p>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-200 flex items-center px-10 italic font-black text-xl tracking-tighter">
            CATÁLOGO <span class="text-blue-600 ml-1 underline decoration-2">PRO</span>
        </header>

        <div class="flex-1 overflow-auto p-10 flex gap-10">
            <div class="w-80 shrink-0">
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-xl space-y-4">
                    <h3 class="text-[10px] font-black uppercase text-blue-600 mb-4 tracking-widest italic">Registro de Insumo</h3>
                    <input id="f-nombre" type="text" placeholder="Descripción del Producto" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 ring-blue-500/20 font-bold text-sm">
                    <div class="grid grid-cols-2 gap-3">
                        <input id="f-sku" type="text" placeholder="SKU" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-xs font-mono uppercase">
                        <input id="f-marca" type="text" placeholder="Marca" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-xs">
                    </div>
                    <div class="border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center bg-slate-50/50">
                        <input type="file" id="f-file" class="text-[10px] w-full">
                    </div>
                    <button onclick="guardar()" id="btn-save" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl hover:bg-blue-700 transition-all">Guardar en la Nube</button>
                </div>
            </div>

            <div class="flex-1 bg-white rounded-[2.5rem] border border-slate-200 shadow-xl overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b border-slate-100 text-[9px] font-black uppercase text-slate-400">
                        <tr><th class="p-6">Información</th><th class="p-6">Identificación</th><th class="p-6 text-right">Acciones</th></tr>
                    </thead>
                    <tbody id="lista" class="divide-y divide-slate-50 italic"></tbody>
                </table>
                <div id="status" class="p-20 text-center text-slate-300 font-black uppercase text-[10px] tracking-[0.3em] animate-pulse">Sincronizando...</div>
            </div>
        </div>
    </main>

    <script>
        // *** 2. AQUÍ ESTÁ EL SECRETO ***
        // Copia tus llaves de Supabase > Settings > API
        const URL_PROYECTO = "https://xnarwetyjeijkitzivno.supabase.co"; 
        const KEY_PROYECTO = "sb_publishable_9N60sB1Y7iOf3lTsh8ZM3Q___nZto7W";

        // Inicializamos la conexión con el nombre 'db' para que el botón lo encuentre
        const db = window.supabase.createClient(URL_PROYECTO, KEY_PROYECTO);

        async function cargar() {
            try {
                const { data, error } = await db.from('productos').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                document.getElementById('status').classList.add('hidden');
                document.getElementById('lista').innerHTML = data.map(p => `
                    <tr class="hover:bg-blue-50/50 transition-all">
                        <td class="p-6 font-bold text-slate-700 uppercase text-xs">${p.nombre}</td>
                        <td class="p-6 font-mono text-blue-600 text-xs font-black">${p.sku}</td>
                        <td class="p-6 text-right">
                            ${p.url_ficha ? `<a href="${p.url_ficha}" target="_blank" class="p-2 bg-slate-100 rounded-lg inline-block text-slate-400 hover:text-blue-600"><i data-lucide="eye" size="14"></i></a>` : ''}
                        </td>
                    </tr>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                document.getElementById('status').innerText = "ERROR DE CONEXIÓN: " + err.message;
            }
        }

        async function guardar() {
            const btn = document.getElementById('btn-save');
            const n = document.getElementById('f-nombre').value;
            const s = document.getElementById('f-sku').value;
            const m = document.getElementById('f-marca').value;
            const f = document.getElementById('f-file').files[0];

            if (!n || !s) return alert("⚠️ Nombre y SKU son obligatorios");

            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            try {
                let link = "";
                if (f) {
                    const ref = `${Date.now()}_${s}.pdf`;
                    const { error: upErr } = await db.storage.from('fichas').upload(ref, f);
                    if (upErr) throw upErr;
                    link = db.storage.from('fichas').getPublicUrl(ref).data.publicUrl;
                }

                const { error: insErr } = await db.from('productos').insert([{ nombre: n, sku: s, marca: m, url_ficha: link }]);
                if (insErr) throw insErr;

                alert("✅ ¡Producto Guardado con Éxito!");
                location.reload();
            } catch (e) {
                alert("❌ ERROR: " + e.message);
                btn.innerText = "Guardar en Catálogo";
                btn.disabled = false;
            }
        }

        window.onload = () => { lucide.createIcons(); cargar(); };
    </script>
</body>
</html>
