<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro - Mis Documentos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .input-field {
            background-color: #fcfcfc;
            border: 1px solid #e2e8f0;
            padding: 10px 14px;
            font-size: 0.85rem;
            border-radius: 10px;
            width: 100%;
            outline: none;
            transition: all 0.2s;
        }
        .input-field:focus { border-color: #2563eb; ring: 2px; ring-color: #dbeafe; }
        label {
            font-size: 10px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
            letter-spacing: 0.05em;
        }
        .card-main { border-radius: 50px; background: white; border: 1px solid #f1f5f9; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.03); }
        .sidebar { background-color: #0f172a; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 sidebar text-white flex flex-col p-8 sticky top-0 h-screen">
        <div class="mb-12">
            <h1 class="text-2xl font-black tracking-tighter uppercase">Mis Documentos</h1>
            <p class="text-[10px] text-blue-400 font-bold uppercase tracking-[0.3em]">Ecosistema AI</p>
        </div>
        <nav class="space-y-6">
            <div class="flex items-center gap-4 text-sm text-slate-400 p-2 cursor-pointer hover:text-white transition">
                <span>📋</span> Inventario Pro
            </div>
            <div class="flex items-center gap-4 text-sm bg-blue-600 p-4 rounded-2xl font-bold shadow-xl shadow-blue-900/40 cursor-pointer hover:bg-blue-700 transition">
                <span class="text-lg">⊕</span> Nuevo Registro
            </div>
        </nav>
    </aside>

    <main class="flex-1 bg-slate-50">
        <header class="h-16 bg-white border-b flex items-center px-10">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Panel de Gestión</h2>
        </header>

        <div class="p-12 max-w-7xl mx-auto">
            <div class="card-main p-16">
                <form id="formCatalogo">
                    
                    <div class="grid grid-cols-12 gap-16">
                        
                        <div class="col-span-12 lg:col-span-4 space-y-8">
                            <div>
                                <label>Fotografía del Insumo</label>
                                <input type="file" id="inputFoto" name="fotoInsumo" class="hidden" accept="image/*">
                                <div onclick="document.getElementById('inputFoto').click()" 
                                     class="aspect-square bg-slate-50 border-2 border-dashed border-slate-200 rounded-[40px] flex flex-col items-center justify-center p-10 cursor-pointer hover:bg-slate-100 transition relative overflow-hidden group">
                                    <img id="previewFoto" class="hidden absolute inset-0 w-full h-full object-contain p-4">
                                    <div id="iconPlaceholder" class="text-center group-hover:scale-110 transition">
                                        <span class="text-4xl block mb-4">📸</span>
                                        <p class="text-[10px] font-black text-slate-400 uppercase">Click para subir imagen</p>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-blue-50/50 border border-blue-100 rounded-[30px] p-8 text-center">
                                <p class="text-[10px] text-blue-600 font-black uppercase mb-4 tracking-widest">Ficha Técnica Proveedor</p>
                                <input type="file" id="inputPdf" name="pdfTecnico" class="hidden" accept=".pdf">
                                <button type="button" onclick="document.getElementById('inputPdf').click()" 
                                        class="w-full bg-white border border-blue-200 py-3 rounded-xl text-blue-600 text-[10px] font-black shadow-sm flex items-center justify-center gap-3 hover:shadow-md transition">
                                    ☁️ <span id="labelPdf">ADJUNTAR PDF</span>
                                </button>
                            </div>
                        </div>

                        <div class="col-span-12 lg:col-span-8 space-y-12">
                            
                            <div>
                                <label class="mb-6 text-blue-500">Información Técnica del Insumo</label>
                                <div class="grid grid-cols-3 gap-5">
                                    <div><label>Item *</label><input type="text" name="item" class="input-field" value="CHMAPIONfhfg"></div>
                                    <div><label>SKU</label><input type="text" name="sku" class="input-field" value="SAFD"></div>
                                    <div><label>SKU ENGE</label><input type="text" name="skuEnge" class="input-field" value="KJHKHG"></div>
                                    <div><label>Centro</label><input type="text" name="centro" class="input-field" value="HKGHJGHJK"></div>
                                    <div><label>Codificación</label><input type="text" name="codificacion" class="input-field" value="KGHJKJH"></div>
                                    <div><label>Fabricante</label><input type="text" name="fabricante" class="input-field" value="KJGHJ"></div>
                                    <div><label>Marca</label><input type="text" name="marca" class="input-field" value="KGH"></div>
                                    <div><label>Modelo</label><input type="text" name="modelo" class="input-field" value="HJKGHKJ"></div>
                                    <div><label>N° de Parte</label><input type="text" name="nParte" class="input-field" value="KHGKHJGH"></div>
                                    <div class="col-span-1"><label>Código Designación</label><input type="text" name="codDesignacion" class="input-field" value="KHG"></div>
                                    <div class="col-span-2"><label>Descripción Breve</label><input type="text" name="descBreve" class="input-field" value="GHKJH"></div>
                                </div>
                            </div>

                            <div class="pt-10 border-t border-slate-100">
                                <label class="mb-6 text-blue-500">Información del Proveedor</label>
                                <div class="grid grid-cols-2 gap-6">
                                    <div>
                                        <label>Nombre Proveedor / Razón Social</label>
                                        <input type="text" name="provNombre" class="input-field" placeholder="Ej: Herramientas SPA">
                                    </div>
                                    <div>
                                        <label>RUT / ID Fiscal</label>
                                        <input type="text" name="provRut" class="input-field" placeholder="12.345.678-9">
                                    </div>
                                    <div>
                                        <label>Contacto / Vendedor</label>
                                        <input type="text" name="provContacto" class="input-field" placeholder="Nombre de contacto">
                                    </div>
                                    <div>
                                        <label>Email / Teléfono</label>
                                        <input type="text" name="provEmail" class="input-field" placeholder="vendedor@empresa.com">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-12">
                        <label>Especificaciones Técnicas (EETT)</label>
                        <textarea name="eett" rows="4" class="input-field mt-2 font-mono text-xs">KHGJKGHJ</textarea>
                    </div>

                    <div class="grid grid-cols-4 gap-6 mt-10">
                        <div><label>Peso</label><input type="text" name="peso" class="input-field" value="HKGH"></div>
                        <div><label>Volumen</label><input type="text" name="volumen" class="input-field" value="GHKK"></div>
                        <div><label>U. Medida</label><input type="text" name="uMedida" class="input-field" value="GHKJH"></div>
                        <div>
                            <label>Estado</label>
                            <select name="estado" class="input-field font-black text-slate-800 appearance-none bg-slate-50">
                                <option value="ACTIVO" selected>ACTIVO</option>
                                <option value="INACTIVO">INACTIVO</option>
                                <option value="PENDIENTE">PENDIENTE</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-12 pt-10 border-t border-slate-100">
                        <label class="mb-6">Logística & Control de Stock</label>
                        <div class="grid grid-cols-3 gap-6 mb-6">
                            <div><label>Requiere MX Bodega</label><input type="text" name="logBodega" class="input-field" value="FGDSG"></div>
                            <div><label>Contar Total</label><input type="number" name="logStock" class="input-field" value="20"></div>
                            <div><label>Contar Completo</label><input type="text" name="logCompleto" class="input-field"></div>
                        </div>
                        <textarea name="logComentarios" rows="3" class="input-field" placeholder="Ubicación física / Comentarios adicionales..."></textarea>
                    </div>

                    <div class="mt-16 flex justify-end items-center gap-10">
                        <button type="button" class="text-xs font-bold text-slate-400 hover:text-slate-600 transition">VOLVER</button>
                        <button type="submit" class="bg-blue-600 text-white px-12 py-5 rounded-[20px] font-black text-xs shadow-2xl shadow-blue-200 flex items-center gap-4 hover:bg-blue-700 hover:scale-105 transition-all active:scale-95">
                            📄 1. GUARDAR REGISTRO
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        // 1. MANEJO DE FOTOGRAFÍA
        const inputFoto = document.getElementById('inputFoto');
        const previewFoto = document.getElementById('previewFoto');
        const iconPlaceholder = document.getElementById('iconPlaceholder');

        inputFoto.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    previewFoto.src = e.target.result;
                    previewFoto.classList.remove('hidden');
                    iconPlaceholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // 2. MANEJO DE PDF
        const inputPdf = document.getElementById('inputPdf');
        const labelPdf = document.getElementById('labelPdf');

        inputPdf.addEventListener('change', function() {
            if (this.files[0]) {
                labelPdf.innerText = "CARGADO: " + this.files[0].name.substring(0, 15);
                labelPdf.parentElement.classList.add('bg-green-50', 'text-green-600', 'border-green-200');
            }
        });

        // 3. CAPTURA Y SALVAGUARDA DE DATOS (EL "BLINDAJE")
        document.getElementById('formCatalogo').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Recogemos absolutamente todos los campos
            const formData = new FormData(this);
            const dataObject = Object.fromEntries(formData.entries());
            
            // Validamos específicamente la Info del Proveedor para que no se "pierda"
            console.log("--- REGISTRO COMPLETO CAPTURADO ---");
            console.log("Producto:", dataObject.item);
            console.log("Proveedor:", dataObject.provNombre); // Aquí está tu dato "perdido"
            console.log("Todo el objeto:", dataObject);

            // Simulación de guardado en la nube
            alert(`Registro de "${dataObject.item}" con Proveedor "${dataObject.provNombre || 'Sin Nombre'}" capturado con éxito.`);
            
            // Opción: Guardar en localStorage para persistencia local inmediata
            localStorage.setItem('ultimoRegistro', JSON.stringify(dataObject));
        });
    </script>
</body>
</html>
