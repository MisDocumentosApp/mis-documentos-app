<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Pro | Diagnóstico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .nav-link { transition: all 0.2s; display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; color: #94a3b8; text-decoration: none; }
        .nav-link:hover { background: #1e293b; color: white; }
        .nav-active { background: #2563eb !important; color: white !important; }
        .input-field { width: 100%; padding: 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; }
    </style>
</head>
<body class="bg-[#f8fafc] font-sans text-slate-900 h-screen flex overflow-hidden">

    <aside class="w-72 bg-[#0f172a] text-white flex flex-col shrink-0 border-r border-white/5">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-10">
                <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="layout-grid" size="20"></i></div>
                <h1 class="text-xs font-black uppercase tracking-widest leading-none">Mis Documentos</h1>
            </div>
            <nav class="space-y-2">
                <a href="index.html" class="nav-link"><i data-lucide="home" size="18"></i> Inicio / Dashboard</a>
                <a href="catalogo.html" class="nav-link nav-active"><i data-lucide="database" size="18"></i> Catálogo Pro</a>
            </nav>
        </div>
        <div class="mt-auto p-6 border-t border-white/5 bg-black/20 text-[10px] text-slate-400">
            <p>Soporte: +569 4743 6919</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-200 flex items-center px-10 shrink-0 italic font-black">
            CATÁLOGO PRO <span class="ml-4 text-[9px] bg-blue-100 text-blue-600 px-2 py-1 rounded">MODO DIAGNÓSTICO</span>
        </header>

        <div class="flex-1 overflow-auto p-10 flex gap-10">
            <div class="w-80 shrink-0 space-y-4">
                <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase text-blue-600 mb-4">Ingreso de Producto</h3>
                    <div class="space-y-3">
                        <input id="in-nombre" type="text" placeholder="Descripción" class="input-field text-sm">
                        <input id="in-sku" type="text" placeholder="SKU" class="input-field text-sm uppercase">
                        <input id="in-marca" type="text" placeholder="Marca" class="input-field text-sm">
                        <input type="file" id="in-file" class="text-[10px]">
                        <button onclick="guardarConMensajes()" id="btn-save" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest mt-2">Guardar Producto</button>
                    </div>
                </div>
            </div>

            <div class="flex-1 bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b border-slate-100 text-[9px] font-black uppercase text-slate-400">
                        <tr><th class="p-4">Producto</th><th class="p-4">SKU</th><th class="p-4 text-right">Acciones</th></tr>
                    </thead>
                    <tbody id="lista" class="divide-y divide-slate-50 italic"></tbody>
                </table>
                <div id="status-msg" class="p-10 text-center text-slate-400 text-xs font-bold">Iniciando conexión...</div>
            </div>
        </div>
    </main>

    <script>
        // --- 1. REEMPLAZA ESTO ---
        const URL_SB = "https://xnarwetyjeijkitzivno.supabase.co"; 
        const KEY_SB = "sb_publishable_9N60sB1Y7iOf3lTsh8ZM3Q___nZto7W";

        const db = window.supabase.createClient(URL_SB, KEY_SB);

        async function cargar() {
            const msg = document.getElementById('status-msg');
            try {
                const { data, error } = await db.from('productos').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                msg.classList.add('hidden');
                document.getElementById('lista').innerHTML = data.map(p => `
                    <tr>
                        <td class="p-4 font-bold">${p.nombre}</td>
                        <td class="p-4 font-mono text-blue-600">${p.sku}</td>
                        <td class="p-4 text-right"><button onclick="alert('PDF Generado')" class="p-2 bg-slate-100 rounded-lg"><i data-lucide="file-text" size="14"></i></button></td>
                    </tr>
                `).join('');
                lucide.createIcons();
            } catch (e) {
                msg.innerText = "ERROR DE CONEXIÓN: " + e.message;
                msg.classList.add('text-red-500');
            }
        }

        async function guardarConMensajes() {
            const btn = document.getElementById('btn-save');
            const n = document.getElementById('in-nombre').value;
            const s = document.getElementById('in-sku').value;
            const m = document.getElementById('in-marca').value;
            const file = document.getElementById('in-file').files[0];

            if(!n || !s) return alert("Por favor escribe el Nombre y SKU");

            btn.innerText = "SUBIENDO...";
            btn.disabled = true;

            let finalUrl = "";
            if(file) {
                const fileName = `${Date.now()}_${s}.pdf`;
                const { data: upData, error: upErr } = await db.storage.from('fichas').upload(fileName, file);
                
                if(upErr) {
                    alert("ERROR AL SUBIR PDF: " + upErr.message + "\n\n¿Creaste el bucket 'fichas' en Supabase?");
                    btn.innerText = "GUARDAR PRODUCTO";
                    btn.disabled = false;
                    return;
                }
                finalUrl = db.storage.from('fichas').getPublicUrl(fileName).data.publicUrl;
            }

            const { error: insErr } = await db.from('productos').insert([{ nombre: n, sku: s, marca: m, url_ficha: finalUrl }]);
            
            if(insErr) {
                alert("ERROR AL GUARDAR DATOS: " + insErr.message);
            } else {
                alert("¡ÉXITO! Producto guardado.");
                location.reload();
            }
            btn.innerText = "GUARDAR PRODUCTO";
            btn.disabled = false;
        }

        window.onload = () => { lucide.createIcons(); cargar(); };
    </script>
</body>
</html>
