<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo Pro - misdocumentosapp.com</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; height: 100vh; overflow: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* SIDEBAR PROFESIONAL */
        .nav-item { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 10px; font-weight: 600; font-size: 0.78rem; text-decoration: none; color: #94a3b8; transition: 0.2s; }
        .nav-item.active { background-color: #2563eb; color: white !important; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
        
        /* DENSIDAD VISUAL (ZOOM 100%) */
        .input-dense { width: 100%; padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.8rem; outline: none; transition: 0.1s; color: #0f172a; }
        .input-dense:focus { border-color: #2563eb; background-color: #fcfdfe; }
        .section-title { font-weight: 800; font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #f1f5f9; padding-bottom: 4px; margin-bottom: 10px; display: block; }
        
        /* MODO EXPORTACIÓN PDF */
        .pdf-export-active { width: 816px !important; padding: 45px !important; margin: 0 !important; border: none !important; box-shadow: none !important; }
        .pdf-export-active .grid-cols-12 { display: block !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 14, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [companies] = useState(['Empresa Principal', 'DEL SOLAR TRUCK & CARS SPA']);
            const [activeCompany, setActiveCompany] = useState(companies[0]);
            const [products, setProducts] = useState([]);
            const [currentView, setCurrentView] = useState('form'); // Iniciamos en Form por tu solicitud
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                const saved = localStorage.getItem(`catalog_products_${activeCompany}`);
                setProducts(saved ? JSON.parse(saved) : []);
            }, [activeCompany]);

            const handleSave = (productData) => {
                const updated = productData.id ? products.map(p => p.id === productData.id ? productData : p) : [ { ...productData, id: Date.now() }, ...products ];
                setProducts(updated);
                localStorage.setItem(`catalog_products_${activeCompany}`, JSON.stringify(updated));
                alert("Producto guardado con éxito");
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* 1. SIDEBAR GLOBAL */}
                    <aside className="w-60 bg-[#0f172a] p-5 flex flex-col shrink-0 shadow-2xl">
                        <div className="mb-8 text-white px-2">
                            <h2 className="font-extrabold text-lg uppercase italic leading-none tracking-tighter">MIS DOCUMENTOS</h2>
                            <p className="text-blue-500 text-[9px] font-bold uppercase mt-1">Ecosistema AI</p>
                        </div>
                        <div className="p-3 bg-slate-800/50 rounded-xl mb-4 border border-white/5">
                            <span className="text-[9px] text-slate-400 font-black uppercase block mb-2">Empresa Actual</span>
                            <select value={activeCompany} onChange={(e) => setActiveCompany(e.target.value)} className="w-full bg-slate-900 text-white text-xs border-0 rounded-lg p-2 outline-none cursor-pointer">
                                {companies.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <nav className="flex-1 space-y-1">
                            <button onClick={() => setCurrentView('list')} className={`w-full nav-item ${currentView === 'list' ? 'active' : ''}`}><Icon name="list" /> Inventario</button>
                            <button onClick={() => setCurrentView('form')} className={`w-full nav-item ${currentView === 'form' ? 'active' : ''}`}><Icon name="plus" /> Nuevo Producto</button>
                            <a href="perfil.html" className="nav-item"><Icon name="user" /> Ficha Comercial</a>
                        </nav>
                        <div className="mt-auto p-4 bg-black/20 rounded-xl text-[7px] text-slate-500 font-black uppercase">
                            <p>Gestionado por <span className="text-blue-500 font-black">misdocumentosapp.com</span></p>
                        </div>
                    </aside>

                    {/* 2. ÁREA DE TRABAJO (DASHBOARD) */}
                    <main className="flex-1 flex flex-col bg-slate-50 min-w-0 overflow-hidden">
                        <header className="h-14 bg-white border-b flex items-center justify-between px-8 shrink-0">
                            <div className="flex items-center gap-2">
                                <Icon name="chevron-right" size={14} className="text-slate-400" />
                                <h1 className="text-sm font-bold text-slate-800 uppercase tracking-widest">Agregar Nuevo Producto</h1>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-6 lg:p-10 custom-scroll bg-slate-50">
                            {currentView === 'form' ? (
                                <ProductForm initialData={selectedProduct} onSave={handleSave} onCancel={() => setCurrentView('list')} />
                            ) : (
                                <div className="text-center p-10 text-slate-400 uppercase font-black text-xs">Módulo de Lista en Desarrollo...</div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        // --- FORMULARIO DE ALTA DENSIDAD ---
        function ProductForm({ initialData, onSave, onCancel }) {
            const [form, setForm] = useState(initialData || { 
                item: '', sku: '', skuEngie: '', centro: '', codificacion: '', description: '', 
                fabricante: '', marca: '', modelo: '', nParte: '', codigoDesignacion: '', unidadMedida: '',
                eett: '', peso: '', volumen: '', requiereMx: '', contarTotal: '', contarCompleto: '',
                proveedor: 'ELECTRICO', razonSocial: 'DEL SOLAR TRUCK & CARS SPA', rut: '76.779.159-3', 
                direccion: 'AV. MANQUEHUE SUR # 520', telefono: '963355961', whatsapp: '+569-47436919',
                contacto: 'ALEJANDRO DEL SOLAR', email: 'sadelsolar@gmail.com', comentarios: '', image: null 
            });

            const handleImg = (e) => {
                const f = e.target.files[0];
                if (f) { const r = new FileReader(); r.onload = (ev) => setForm({...form, image: ev.target.result}); r.readAsDataURL(f); }
            };

            return (
                <div className="max-w-6xl mx-auto bg-white p-10 rounded-2xl shadow-xl border border-slate-200 transition-all">
                    
                    <div className="grid grid-cols-12 gap-10">
                        {/* COLUMNA IZQUIERDA: ARCHIVOS */}
                        <div className="col-span-4 space-y-6">
                            <span className="section-title">Archivos Adjuntos</span>
                            <div className="aspect-square bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center p-6 relative overflow-hidden group hover:border-blue-400 transition cursor-pointer">
                                {form.image ? <img src={form.image} className="w-full h-full object-contain" /> : <div className="text-center"><Icon name="image" size={40} className="text-slate-200 mx-auto mb-2"/><p className="text-[10px] text-slate-400 font-black uppercase">Sin fotografía</p></div>}
                                <input type="file" onChange={handleImg} className="absolute inset-0 opacity-0 cursor-pointer" />
                            </div>
                            <div className="p-4 bg-blue-50 border border-blue-100 rounded-xl">
                                <label className="text-[10px] font-black text-blue-800 uppercase block mb-2">Ficha Técnica (PDF)</label>
                                <label className="flex items-center gap-3 px-4 py-2.5 bg-white border border-blue-200 rounded-lg cursor-pointer hover:bg-blue-50 transition shadow-sm">
                                    <Icon name="upload-cloud" className="text-blue-600" />
                                    <span className="text-[10px] font-bold text-slate-500 uppercase">Seleccionar Archivo</span>
                                    <input type="file" className="hidden" accept="application/pdf" />
                                </label>
                            </div>
                        </div>

                        {/* COLUMNA DERECHA: INFO Y FABRICACIÓN */}
                        <div className="col-span-8 space-y-6">
                            <span className="section-title">Información General</span>
                            <div className="grid grid-cols-3 gap-4">
                                <div className="col-span-1"><label className="text-[9px] font-black text-slate-400 uppercase">ITEM *</label><input className="input-dense" value={form.item} onChange={e => setForm({...form, item: e.target.value})} /></div>
                                <div className="col-span-1"><label className="text-[9px] font-black text-slate-400 uppercase">SKU</label><input className="input-dense" value={form.sku} onChange={e => setForm({...form, sku: e.target.value})} /></div>
                                <div className="col-span-1"><label className="text-[9px] font-black text-slate-400 uppercase">SKU ENGIE</label><input className="input-dense" value={form.skuEngie} onChange={e => setForm({...form, skuEngie: e.target.value})} /></div>
                                <div className="col-span-1"><label className="text-[9px] font-black text-slate-400 uppercase">Centro</label><input className="input-dense" value={form.centro} onChange={e => setForm({...form, centro: e.target.value})} /></div>
                                <div className="col-span-1"><label className="text-[9px] font-black text-slate-400 uppercase">Codificación</label><input className="input-dense" value={form.codificacion} onChange={e => setForm({...form, codificacion: e.target.value})} /></div>
                                <div className="col-span-1"><label className="text-[9px] font-black text-slate-400 uppercase">Description (40c)</label><input className="input-dense" value={form.description} onChange={e => setForm({...form, description: e.target.value})} maxLength="40" /></div>
                            </div>

                            <span className="section-title pt-4">Detalles de Fabricación</span>
                            <div className="grid grid-cols-3 gap-4">
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Fabricante</label><input className="input-dense" value={form.fabricante} onChange={e => setForm({...form, fabricante: e.target.value})} /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Marca</label><input className="input-dense" value={form.marca} onChange={e => setForm({...form, marca: e.target.value})} /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Modelo</label><input className="input-dense" value={form.modelo} onChange={e => setForm({...form, modelo: e.target.value})} /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">N° de Parte</label><input className="input-dense" value={form.nParte} onChange={e => setForm({...form, nParte: e.target.value})} /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Código Designación</label><input className="input-dense" value={form.codigoDesignacion} onChange={e => setForm({...form, codigoDesignacion: e.target.value})} /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Unidad de Medida</label><input className="input-dense" placeholder="Ej: C/U" value={form.unidadMedida} onChange={e => setForm({...form, unidadMedida: e.target.value})} /></div>
                            </div>
                        </div>

                        {/* SECCIÓN EETT */}
                        <div className="col-span-12 space-y-4 pt-6 border-t">
                            <span className="section-title">Especificaciones Técnicas (EETT)</span>
                            <textarea className="input-dense h-24 font-mono text-[11px]" placeholder="Ingrese especificaciones técnicas detalladas..." value={form.eett} onChange={e => setForm({...form, eett: e.target.value})}></textarea>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Peso</label><input className="input-dense" placeholder="Ej: 1.270 grs" value={form.peso} onChange={e => setForm({...form, peso: e.target.value})} /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Volumen / Dimensiones</label><input className="input-dense" placeholder="Ej: SIZE 3" value={form.volumen} onChange={e => setForm({...form, volumen: e.target.value})} /></div>
                            </div>
                        </div>

                        {/* INFO PROVEEDOR */}
                        <div className="col-span-12 space-y-4 pt-6 border-t">
                            <span className="section-title">Información del Proveedor</span>
                            <div className="grid grid-cols-4 gap-4">
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Proveedor</label><input className="input-dense bg-slate-50" value={form.proveedor} readOnly /></div>
                                <div className="col-span-1"><label className="text-[9px] font-black text-slate-400 uppercase">Razón Social</label><input className="input-dense bg-slate-50" value={form.razonSocial} readOnly /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">RUT</label><input className="input-dense bg-slate-50" value={form.rut} readOnly /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Dirección</label><input className="input-dense bg-slate-50" value={form.direccion} readOnly /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Teléfono</label><input className="input-dense bg-slate-50" value={form.telefono} readOnly /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">WhatsApp</label><input className="input-dense bg-slate-50" value={form.whatsapp} readOnly /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Contacto</label><input className="input-dense bg-slate-50" value={form.contacto} readOnly /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Email</label><input className="input-dense bg-slate-50" value={form.email} readOnly /></div>
                            </div>
                        </div>

                        {/* LOGÍSTICA */}
                        <div className="col-span-12 space-y-4 pt-6 border-t">
                            <span className="section-title">Logística, Stock y Otros</span>
                            <div className="grid grid-cols-3 gap-4">
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">¿Requiere Mx en Bodega?</label><input className="input-dense" value={form.requiereMx} onChange={e => setForm({...form, requiereMx: e.target.value})} /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Contar Total</label><input className="input-dense" value={form.contarTotal} onChange={e => setForm({...form, contarTotal: e.target.value})} /></div>
                                <div><label className="text-[9px] font-black text-slate-400 uppercase">Contar Completo</label><input className="input-dense" value={form.contarCompleto} onChange={e => setForm({...form, contarCompleto: e.target.value})} /></div>
                            </div>
                            <div className="mt-2">
                                <label className="text-[9px] font-black text-slate-400 uppercase">Comentarios / Stock / Otros</label>
                                <textarea className="input-dense h-16" value={form.comentarios} onChange={e => setForm({...form, comentarios: e.target.value})}></textarea>
                            </div>
                        </div>

                        {/* BOTONES AZULES UNIFICADOS */}
                        <div className="col-span-12 flex justify-end gap-4 border-t pt-8">
                            <button onClick={onCancel} className="px-8 py-3 bg-slate-100 text-slate-500 rounded-xl font-black uppercase text-[11px] tracking-widest hover:bg-slate-200 transition">Cancelar</button>
                            <button onClick={() => onSave(form)} className="px-10 py-3 bg-blue-600 text-white rounded-xl font-black uppercase text-[11px] tracking-widest shadow-lg shadow-blue-200 transition active:scale-95 flex items-center gap-2">
                                <Icon name="save" size={16} /> Guardar Producto
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
