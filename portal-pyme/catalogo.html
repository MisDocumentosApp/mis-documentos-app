<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Gestión - Ecosistema AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .input-field {
            background-color: #fcfcfc;
            border: 1px solid #e2e8f0;
            padding: 10px 14px;
            font-size: 0.85rem;
            border-radius: 10px;
            width: 100%;
            outline: none;
            transition: all 0.2s;
        }
        .input-field:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        label {
            font-size: 10px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
            letter-spacing: 0.05em;
        }
        .card-main { border-radius: 50px; background: white; border: 1px solid #e2e8f0; }
        .sidebar { background-color: #0f172a; }
        /* Estilo para que el PDF no salga cortado */
        .pdf-mode { padding: 40px !important; border-radius: 0 !important; border: none !important; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 sidebar text-white flex flex-col p-8 sticky top-0 h-screen hidden lg:flex">
        <div class="mb-12">
            <h1 class="text-2xl font-black tracking-tighter uppercase">Mis Documentos</h1>
            <p class="text-[10px] text-blue-400 font-bold uppercase tracking-[0.3em]">Ecosistema AI</p>
        </div>
        <nav class="space-y-6">
            <div class="flex items-center gap-4 text-sm text-slate-400 p-2 cursor-pointer hover:text-white transition">
                <span>📋</span> Inventario Pro
            </div>
            <div class="flex items-center gap-4 text-sm bg-blue-600 p-4 rounded-2xl font-bold shadow-xl shadow-blue-900/40 cursor-pointer">
                <span class="text-lg">⊕</span> Nuevo Registro
            </div>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <header class="h-16 bg-white border-b flex items-center px-10">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Panel de Gestión / Nuevo Insumo</h2>
        </header>

        <div class="p-8 lg:p-12 max-w-7xl mx-auto">
            <div id="capture-area" class="card-main p-10 lg:p-16 shadow-2xl shadow-slate-200">
                <form id="mainForm">
                    
                    <div class="grid grid-cols-12 gap-12">
                        <div class="col-span-12 lg:col-span-4 space-y-8">
                            <div>
                                <label>Fotografía del Insumo</label>
                                <input type="file" id="inputImage" name="foto" class="hidden" accept="image/*">
                                <div onclick="document.getElementById('inputImage').click()" 
                                     class="aspect-square bg-slate-50 border-2 border-dashed border-slate-200 rounded-[40px] flex flex-col items-center justify-center p-6 cursor-pointer hover:bg-blue-50 transition relative overflow-hidden group">
                                    <img id="previewImage" class="hidden absolute inset-0 w-full h-full object-contain p-4 bg-white">
                                    <div id="uploadPrompt" class="text-center group-hover:scale-110 transition">
                                        <span class="text-4xl block mb-4">📸</span>
                                        <p class="text-[10px] font-black text-slate-400 uppercase">Click para subir imagen</p>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-blue-50/50 border border-blue-100 rounded-[30px] p-8 text-center">
                                <p class="text-[10px] text-blue-600 font-black uppercase mb-4 tracking-widest">Ficha Técnica Proveedor</p>
                                <input type="file" id="inputPdf" name="pdf" class="hidden" accept=".pdf">
                                <button type="button" onclick="document.getElementById('inputPdf').click()" 
                                        class="w-full bg-white border border-blue-200 py-3 rounded-xl text-blue-600 text-[10px] font-black shadow-sm flex items-center justify-center gap-3 hover:bg-blue-600 hover:text-white transition-all">
                                    ☁️ <span id="pdfText">ADJUNTAR PDF</span>
                                </button>
                            </div>
                        </div>

                        <div class="col-span-12 lg:col-span-8 space-y-12">
                            <div>
                                <h3 class="text-[11px] font-black text-blue-600 uppercase tracking-widest mb-6 flex items-center gap-2">
                                    <span class="w-2 h-2 bg-blue-600 rounded-full"></span> Información Técnica
                                </h3>
                                <div class="grid grid-cols-3 gap-5">
                                    <div><label>Item *</label><input type="text" name="item" class="input-field" value="CHMAPIONfhfg"></div>
                                    <div><label>SKU</label><input type="text" name="sku" class="input-field" value="SAFD"></div>
                                    <div><label>SKU ENGE</label><input type="text" name="skuEnge" class="input-field" value="KJHKHG"></div>
                                    <div><label>Centro</label><input type="text" name="centro" class="input-field" value="HKGHJGHJK"></div>
                                    <div><label>Codificación</label><input type="text" name="cod" class="input-field" value="KGHJKJH"></div>
                                    <div><label>Fabricante</label><input type="text" name="fab" class="input-field" value="KJGHJ"></div>
                                    <div><label>Marca</label><input type="text" name="marca" class="input-field" value="KGH"></div>
                                    <div><label>Modelo</label><input type="text" name="modelo" class="input-field" value="HJKGHKJ"></div>
                                    <div><label>N° Parte</label><input type="text" name="parte" class="input-field" value="KHGKHJGH"></div>
                                    <div class="col-span-1"><label>Cód. Designación</label><input type="text" name="desig" class="input-field" value="KHG"></div>
                                    <div class="col-span-2"><label>Descripción Breve</label><input type="text" name="desc" class="input-field" value="GHKJH"></div>
                                </div>
                            </div>

                            <div class="pt-10 border-t border-slate-100">
                                <h3 class="text-[11px] font-black text-blue-600 uppercase tracking-widest mb-6 flex items-center gap-2">
                                    <span class="w-2 h-2 bg-blue-600 rounded-full"></span> Datos del Proveedor
                                </h3>
                                <div class="grid grid-cols-2 gap-6">
                                    <div><label>Nombre / Razón Social</label><input type="text" name="prov_nombre" class="input-field" placeholder="Empresa SPA"></div>
                                    <div><label>RUT / Tax ID</label><input type="text" name="prov_rut" class="input-field" placeholder="12.345.678-9"></div>
                                    <div><label>Contacto Vendedor</label><input type="text" name="prov_cont" class="input-field" placeholder="Juan Pérez"></div>
                                    <div><label>Email / Teléfono</label><input type="text" name="prov_mail" class="input-field" placeholder="vendedor@correo.com"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-12">
                        <label>Especificaciones Técnicas (EETT)</label>
                        <textarea name="eett" rows="4" class="input-field mt-2 font-mono text-xs">KHGJKGHJ</textarea>
                    </div>

                    <div class="grid grid-cols-4 gap-6 mt-10">
                        <div><label>Peso</label><input type="text" name="peso" class="input-field" value="HKGH"></div>
                        <div><label>Volumen</label><input type="text" name="vol" class="input-field" value="GHKK"></div>
                        <div><label>U. Medida</label><input type="text" name="med" class="input-field" value="GHKJH"></div>
                        <div>
                            <label>Estado</label>
                            <select name="estado" class="input-field font-black text-blue-600">
                                <option value="ACTIVO" selected>ACTIVO</option>
                                <option value="INACTIVO">INACTIVO</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-12 pt-10 border-t border-slate-100">
                        <label class="mb-6">Logística & Control de Stock</label>
                        <div class="grid grid-cols-3 gap-6 mb-6">
                            <div><label>Requiere MX Bodega</label><input type="text" name="log_bod" class="input-field" value="FGDSG"></div>
                            <div><label>Contar Total</label><input type="number" name="log_tot" class="input-field" value="20"></div>
                            <div><label>Contar Completo</label><input type="text" name="log_comp" class="input-field"></div>
                        </div>
                        <textarea name="log_com" rows="3" class="input-field" placeholder="Ubicación física / Comentarios adicionales..."></textarea>
                    </div>

                    <div class="mt-16 flex justify-end items-center gap-6 no-print">
                        <button type="button" class="text-xs font-bold text-slate-400 hover:text-slate-600">VOLVER</button>
                        
                        <button type="button" onclick="descargarFichaPDF()" 
                                class="border-2 border-blue-600 text-blue-600 px-8 py-4 rounded-2xl font-black text-[11px] hover:bg-blue-50 transition-all flex items-center gap-3">
                            📥 EXPORTAR PDF
                        </button>

                        <button type="submit" class="bg-blue-600 text-white px-12 py-4 rounded-2xl font-black text-[11px] shadow-2xl shadow-blue-200 flex items-center gap-4 hover:bg-blue-700 transition-all">
                            📄 1. GUARDAR REGISTRO
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        // 1. LÓGICA DE IMAGEN
        const inputImage = document.getElementById('inputImage');
        const previewImage = document.getElementById('previewImage');
        const uploadPrompt = document.getElementById('uploadPrompt');

        inputImage.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    previewImage.src = e.target.result;
                    previewImage.classList.remove('hidden');
                    uploadPrompt.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // 2. LÓGICA DE PDF ADJUNTO
        const inputPdf = document.getElementById('inputPdf');
        const pdfText = document.getElementById('pdfText');

        inputPdf.addEventListener('change', function() {
            if (this.files[0]) {
                pdfText.innerText = "PDF: " + this.files[0].name.substring(0, 12) + "...";
                pdfText.parentElement.classList.add('bg-green-600', 'text-white', 'border-green-600');
            }
        });

        // 3. GENERADOR DE PDF (FICHA TÉCNICA)
        function descargarFichaPDF() {
            const element = document.getElementById('capture-area');
            const buttons = document.querySelector('.no-print');
            const itemName = document.getElementsByName('item')[0].value || 'Insumo';

            // Ocultar botones temporalmente para el PDF
            buttons.style.display = 'none';
            
            const opt = {
                margin:       [10, 10],
                filename:     `Ficha_${itemName}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                buttons.style.display = 'flex'; // Volver a mostrar botones
            });
        }

        // 4. GUARDAR REGISTRO (CONSOLA)
        document.getElementById('mainForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(this).entries());
            console.log("--- DATOS CAPTURADOS ---", data);
            alert("Información de " + data.item + " guardada correctamente en el sistema.");
        });
    </script>
</body>
</html>
