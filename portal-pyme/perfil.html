<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ficha Comercial - Tamaño Oficio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #0d9488;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: #334155; }
        
        /* Ajuste de contenedor para aprovechar el largo del Oficio */
        .container { max-width: 800px; margin: 0 auto; padding: 15px; background: white; border-radius: 4px; }

        /* Header más compacto */
        .header-pro { border-bottom: 3px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        
        .logo-container { width: 100px; height: 100px; border: 1px dashed #cbd5e1; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; background: #f8fafc; }
        .logo-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .logo-placeholder { font-size: 0.6rem; color: #94a3b8; text-align: center; }

        .title-area { text-align: right; }
        .header-pro h1 { color: var(--primary); text-transform: uppercase; margin: 0; font-size: 1.5rem; letter-spacing: 1px; }
        .header-pro p { margin: 2px 0 0; color: #64748b; font-size: 0.85rem; font-weight: 500; }

        /* Tarjetas con menos margen para evitar el salto de página */
        .card { border: 1px solid var(--border); border-radius: 4px; margin-bottom: 12px; overflow: hidden; }
        .card-header { background: #f8fafc; padding: 8px 15px; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; color: var(--primary); border-bottom: 1px solid var(--border); display: flex; align-items: center; }
        .card-header::before { content: ""; width: 3px; height: 12px; background: var(--accent); margin-right: 8px; border-radius: 1px; }

        .grid-form { display: grid; grid-template-columns: 180px 1fr; gap: 8px; padding: 12px 15px; align-items: center; }
        .label { font-weight: 600; font-size: 0.75rem; color: #64748b; text-transform: uppercase; }

        input.pro-field { width: 100%; padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 3px; font-size: 0.9rem; box-sizing: border-box; }
        
        .btn-pdf { width: 100%; padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; background: var(--accent); color: white; font-size: 0.9rem; margin-top: 5px; }

        @media print { 
            .btn-pdf, .logo-placeholder { display: none !important; } 
            .container { box-shadow: none; border: none; padding: 0; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container" id="ficha-comercial">
    <div class="header-pro">
        <div class="logo-container" onclick="document.getElementById('input-logo').click()">
            <img id="logo-preview" src="" style="display:none;">
            <div id="placeholder-text" class="logo-placeholder">SUBIR LOGO</div>
        </div>
        <input type="file" id="input-logo" hidden accept="image/*" onchange="cargarLogo(event)">

        <div class="title-area">
            <h1 id="display-razon">Ficha Comercial</h1>
            <p>Información Bancaria y de Contacto</p>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Antecedentes de la Empresa</div>
        <div class="grid-form">
            <div class="label">Razón Social:</div>
            <input type="text" id="razon_social" class="pro-field" oninput="actualizarTitulo(this)">
            <div class="label">RUT Empresa:</div>
            <input type="text" class="pro-field">
            <div class="label">Giro / Actividad:</div>
            <input type="text" class="pro-field">
            <div class="label">Dirección:</div>
            <input type="text" class="pro-field">
            <div class="label">Sitio Web:</div>
            <input type="text" class="pro-field">
        </div>
    </div>

    <div class="card">
        <div class="card-header">Información de Contacto</div>
        <div class="grid-form">
            <div class="label">Nombre Contacto:</div>
            <input type="text" class="pro-field">
            <div class="label">RUT Contacto:</div>
            <input type="text" class="pro-field">
            <div class="label">Teléfono:</div>
            <input type="text" class="pro-field">
            <div class="label">Email Corporativo:</div>
            <input type="text" class="pro-field">
        </div>
    </div>

    <div class="card" style="border-left: 5px solid var(--accent);">
        <div class="card-header" style="color: var(--accent);">Instrucciones para Pago</div>
