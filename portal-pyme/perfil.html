<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Comercial Pro - misdocumentosapp.com</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; }
        
        /* SIDEBAR ADAPTATIVO */
        #sidebar { transition: transform 0.3s ease-in-out; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; font-weight: 600; font-size: 0.875rem; text-decoration: none; color: #94a3b8; transition: 0.3s; }
        .nav-item:hover { background-color: #1e293b; color: white; }
        .nav-item.active { background-color: #2563eb; color: white !important; }

        /* DISEÑO DE LA FICHA (OFICIO 216x330mm) */
        #ficha-pdf { width: 816px; min-height: 1248px; background: white; padding: 50px; box-sizing: border-box; position: relative; }
        
        .card { border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .card-header { background: #f8fafc; padding: 10px 20px; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; color: #1e293b; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 10px; }
        .card-header::before { content: ""; width: 4px; height: 16px; background: #2563eb; border-radius: 4px; }

        .grid-row { display: grid; grid-template-columns: 200px 1fr; gap: 10px; padding: 8px 20px; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .grid-row:last-child { border-bottom: none; }
        
        .label { font-weight: 700; font-size: 0.65rem; color: #64748b; text-transform: uppercase; }
        input.pro-field { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.85rem; outline: none; transition: 0.2s; color: #0f172a; }
        input.pro-field:focus { border-color: #2563eb; background: #fcfdfe; }

        /* AJUSTES MÓVIL */
        @media (max-width: 1024px) {
            #ficha-pdf { width: 100%; min-height: auto; padding: 20px; }
            .grid-row { grid-template-columns: 1fr; gap: 4px; padding: 12px 15px; }
        }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="overflow-hidden flex h-screen">

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-[#0f172a] p-6 flex flex-col transform -translate-x-full lg:translate-x-0 lg:static transition-transform shadow-2xl">
        <div class="flex justify-between items-center mb-10 text-white">
            <div>
                <h2 class="font-extrabold text-xl leading-none">MIS DOCUMENTOS</h2>
                <p class="text-blue-500 text-[10px] font-bold tracking-widest uppercase mt-1">Ecosistema AI</p>
            </div>
            <button onclick="toggleMenu()" class="lg:hidden text-slate-400"><i data-lucide="x"></i></button>
        </div>
        <nav class="flex-1 space-y-2">
            <a href="index.html" class="nav-item"><i data-lucide="home" size="18"></i> Inicio / Dashboard</a>
            <a href="perfil.html" class="nav-item active"><i data-lucide="user" size="18"></i> Ficha Comercial</a>
            <a href="catalogo.html" class="nav-item"><i data-lucide="database" size="18"></i> Catálogo Pro</a>
            <a href="fichas.html" class="nav-item"><i data-lucide="file-text" size="18"></i> Fichas Técnicas</a>
            <a href="cotizaciones.html" class="nav-item"><i data-lucide="shopping-cart" size="18"></i> Cotizaciones</a>
        </nav>
        <div class="mt-auto p-4 bg-black/20 rounded-xl text-[9px] text-slate-500 font-black uppercase tracking-widest leading-relaxed border border-white/5">
            <p>Gestionado por <span class="text-blue-500">misdocumentosapp.com</span></p>
            <p class="mt-3 opacity-50 italic">Soporte Técnico:</p>
            <p class="lowercase">microempresasaunclick@gmail.com</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-slate-100 overflow-hidden">
        
        <header class="h-16 bg-white border-b px-4 flex items-center justify-between lg:hidden shrink-0">
            <button onclick="toggleMenu()" class="p-2 text-slate-600"><i data-lucide="menu"></i></button>
            <span class="font-bold text-xs uppercase tracking-widest text-blue-600">Ficha Comercial</span>
            <div class="w-8"></div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 lg:p-10 flex justify-center no-scrollbar">
            <div id="ficha-pdf" class="shadow-2xl rounded-none lg:rounded-xl">
                
                <div class="border-b-4 border-slate-900 pb-6 mb-8 flex flex-col sm:flex-row justify-between items-center gap-6">
                    <div class="w-32 h-32 border-2 border-dashed border-slate-200 flex items-center justify-center bg-slate-50 rounded-2xl relative overflow-hidden group cursor-pointer" onclick="document.getElementById('logo-file').click()">
                        <img id="pdf-logo" class="hidden max-w-full max-h-full object-contain p-2">
                        <div id="pdf-logo-txt" class="flex flex-col items-center text-slate-400">
                            <i data-lucide="image-plus" size="20"></i>
                            <span class="text-[7px] font-black uppercase mt-1">Logo</span>
                        </div>
                    </div>
                    <input type="file" id="logo-file" class="hidden" accept="image/*" onchange="loadLogo(event)">
                    <div class="text-center sm:text-right">
                        <h1 id="header-rs" class="text-4xl font-black text-slate-9
