    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        /* Configuración Base */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Sidebar Profesional */
        .sidebar {
            width: 280px;
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            flex-shrink: 0;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .nav-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 14px 16px; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 0.875rem; 
            text-decoration: none; 
            transition: all 0.3s ease; 
            color: #94a3b8; 
            margin-bottom: 8px;
        }

        .nav-item:hover { 
            background-color: #1e293b; 
            color: white; 
            transform: translateX(4px);
        }

        .nav-item.active { 
            background-color: #2563eb; 
            color: white !important; 
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4); 
        }

        /* Área de Visualización Oficio */
        .preview-area { 
            flex-grow: 1; 
            background-color: #f1f5f9; 
            overflow-y: auto; 
            padding: 50px; 
            display: flex; 
            justify-content: center; 
        }

        #ficha-documento { 
            width: 816px; 
            min-height: 1248px; 
            background: white; 
            padding: 60px; 
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.15); 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box;
            position: relative;
        }

        /* Estructura de Secciones */
        .card { 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            margin-bottom: 24px; 
            overflow: hidden; 
            background: white; 
            transition: border-color 0.3s;
        }

        .card:hover { border-color: #cbd5e1; }

        .card-header { 
            background: #f8fafc; 
            padding: 12px 24px; 
            font-weight: 800; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            color: #1e293b; 
            border-bottom: 1px solid #e2e8f0; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            letter-spacing: 0.05em;
        }

        .card-header::before { 
            content: ""; 
            width: 4px; 
            height: 18px; 
            background: #0d9488; 
            border-radius: 4px; 
        }

        /* Filas de la Grilla */
        .grid-row { 
            display: grid; 
            grid-template-columns: 220px 1fr; 
            gap: 15px; 
            padding: 14px 24px; 
            align-items: center; 
            border-bottom: 1px solid #f1f5f9; 
        }

        .grid-row:last-child { border-bottom: none; }
        
        .label { 
            font-weight: 700; 
            font-size: 0.75rem; 
            color: #475569; 
            text-transform: uppercase; 
            letter-spacing: 0.025em;
        }

        input.pro-field { 
            width: 100%; 
            padding: 10px 14px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            font-size: 0.9rem; 
            outline: none; 
            transition: all 0.2s; 
            color: #0f172a;
            background: #fff;
        }

        input.pro-field:focus { 
            border-color: #2563eb; 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background-color: #fcfdfe;
        }

        /* Botones Pro */
        .btn-limpiar { background-color: #e2e8f0; color: #475569; }
        .btn-descargar { background-color: #0d9488; color: white; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
