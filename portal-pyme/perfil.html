<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ficha Comercial - misdocumentosapp.com</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* SIDEBAR PROFESIONAL */
        #sidebar { transition: transform 0.3s ease-in-out; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; font-weight: 600; font-size: 0.875rem; text-decoration: none; color: #94a3b8; transition: 0.3s; }
        .nav-item:hover { background-color: #1e293b; color: white; }
        .nav-item.active { background-color: #2563eb; color: white !important; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); }

        /* CONTENEDOR DE TRABAJO (DASHBOARD LOOK) */
        #workspace-container {
            width: 100%;
            max-width: 1000px; /* Expandido para PC */
            background: white;
            margin: 0 auto;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
        }

        .card { border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; overflow: hidden; background: #fff; }
        .card-header { background: #f8fafc; padding: 12px 24px; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; color: #1e293b; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 10px; }
        
        .grid-row { display: grid; grid-template-columns: 220px 1fr; gap: 15px; padding: 10px 24px; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .label { font-weight: 700; font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.025em; }
        
        input.pro-field { 
            width: 100%; 
            padding: 10px 15px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            font-size: 0.9rem; 
            outline: none; 
            transition: all 0.2s; 
            color: #0f172a; 
        }
        input.pro-field:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        /* RESPONSIVE PARA CELULARES */
        @media (max-width: 1024px) {
            .grid-row { grid-template-columns: 1fr; gap: 6px; padding: 15px 20px; }
            #workspace-container { border: none; box-shadow: none; padding: 20px !important; }
        }

        /* ESTILOS EXCLUSIVOS PARA PDF (FORZADO A OFICIO) */
        .pdf-export-mode { width: 816px !important; padding: 50px !important; margin: 0 !important; }
        .pdf-export-mode .grid-row { grid-template-columns: 200px 1fr !important; padding: 8px 20px !important; }
    </style>
</head>
