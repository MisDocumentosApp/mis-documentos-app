    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; font-weight: 600; font-size: 0.875rem; text-decoration: none; transition: 0.3s; color: #94a3b8; }
        .nav-item:hover { background-color: #1e293b; color: white; }
        .nav-item.active { background-color: #2563eb; color: white !important; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); }
        
        /* Estilos de la Ficha */
        .card { border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 16px; overflow: hidden; background: white; }
        .card-header { background: #f8fafc; padding: 10px 20px; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; color: #0f172a; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 8px; }
        .card-header::before { content: ""; width: 4px; height: 16px; background: #0d9488; border-radius: 2px; }
        
        .grid-row { display: grid; grid-template-columns: 200px 1fr; gap: 10px; padding: 10px 20px; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .grid-row:last-child { border-bottom: none; }
        
        .label { font-weight: 700; font-size: 0.75rem; color: #475569; text-transform: uppercase; letter-spacing: 0.025em; }
        input.pro-field { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9rem; transition: all 0.2s; color: #1e293b; }
        input.pro-field:focus { outline: none; border-color: #2563eb; ring: 2px; ring-color: #bfdbfe; background-color: #f8fafc; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
